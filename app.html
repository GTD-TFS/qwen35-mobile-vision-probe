// La capa "IA LOCAL" actual es ligera y no usa modelos pesados en navegador.

async function extractPrimaryFieldsWithLocalAI(ocr){
  const out = {};
  const idesp = parseSpanishIdespBlockFromOCR(ocr) || {};
  const mrzIdentity = extractMrzIdentityFromOCR(ocr) || {};
  const blocks = parseLabeledDocumentBlocks(ocr);

  if (mrzIdentity.Nombre) out.Nombre = mrzIdentity.Nombre;
  if (mrzIdentity.Apellidos) out.Apellidos = mrzIdentity.Apellidos;
  if (!out.Nombre && idesp.Nombre) out.Nombre = idesp.Nombre;
  if (!out.Apellidos && idesp.Apellidos) out.Apellidos = idesp.Apellidos;

  const lineObjs = tokenizeOCRLines(ocr);
  const fallbackNameLine = lineObjs
    .map(item => normalizeMrzOcrLine(item.raw))
    .find(line => !/^\d{6}[A-Z]/.test(line) && (/<<|<[A-Z]+</.test(line) || ((line.match(/K/g) || []).length >= 3)));
  if ((!out.Nombre || !out.Apellidos) && fallbackNameLine){
    const normalized = normalizeMrzNameLine(fallbackNameLine);
    const parts = normalized.split("<<");
    const surnames = cleanMRZNameChunk(parts[0]).toUpperCase();
    const names = tcase(cleanMRZNameChunk(parts.slice(1).join(" ")));
    if (!out.Apellidos && isLikelyValidSurname(surnames)) out.Apellidos = surnames;
    if (!out.Nombre && isLikelyValidName(names)) out.Nombre = names;
  }

  if (blocks["Nombre de los Padres"]) out["Nombre de los Padres"] = blocks["Nombre de los Padres"];
  if (blocks["Lugar de nacimiento"]) out["Lugar de nacimiento"] = blocks["Lugar de nacimiento"];
  if (blocks.Domicilio) out.Domicilio = blocks.Domicilio;

  return sanitizeParsedObjectFields(out);
}

function mergeFieldsWithLocalAI(base, localAI){
  const merged = { ...base };
  const useIfBetter = (key, validator, formatter, shouldOverride) => {
    const current = sanitizeParsedFieldValue(key, merged[key] || "");
    const candidate = sanitizeParsedFieldValue(key, localAI[key] || "");
    if (!candidate) return;
    if (validator && !validator(candidate)) return;
    if (!shouldOverride(current, candidate)) return;
    merged[key] = formatter ? formatter(candidate) : candidate;
  };

  useIfBetter(
    "Nombre",
    isLikelyValidName,
    v => tcase(v),
    current => {
      const cur = normalize(current);
      return !isLikelyValidName(current)
        || cur === normalize("ARONA")
        || cur === normalize("FRONTERA")
        || cur === normalize("ADEJE")
        || cur === normalize("SAN CRISTOBAL DE LA LAGUNA");
    }
  );
  useIfBetter(
    "Apellidos",
    isLikelyValidSurname,
    v => v.toUpperCase(),
    current => !isLikelyValidSurname(current)
  );
  useIfBetter(
    "Nombre de los Padres",
    isLikelyValidParents,
    v => tcase(v),
    current => !isLikelyValidParents(current)
  );
  useIfBetter(
    "Lugar de nacimiento",
    isLikelyValidPlace,
    v => tcase(v),
    current => !isLikelyValidPlace(current)
  );
  useIfBetter(
    "Domicilio",
    isLikelyValidAddress,
    v => tcase(v),
    current => !current
  );
  return sanitizeParsedObjectFields(merged);
}

function isClearlyBadParentsValue(value){
  const v = normalize(value || "");
  if (!v) return false;
  return /HIJO|HIJA|PADRE|MADRE|HIJOA|A DE|LUGAR|DOMICILIO|NACIMIENTO|IDESP|DESP/.test(v);
}

function enforceSafeOutput(parsed){
  const safe = sanitizeParsedObjectFields({ ...parsed });

  if (!isLikelyValidDoc(safe["NВә Documento"] || "")) safe["NВә Documento"] = "";
  if (!isLikelyValidDate(safe["Fecha de nacimiento"] || "")) safe["Fecha de nacimiento"] = "";
  if (!((safe.Sexo || "") === "MASCULINO" || (safe.Sexo || "") === "FEMENINO")) safe.Sexo = "";

  const coreTrusted =
    isLikelyValidDoc(safe["NВә Documento"] || "") &&
    isLikelyValidDate(safe["Fecha de nacimiento"] || "");

  if (!coreTrusted){
    if (!isLikelyValidName(safe.Nombre || "") || (safe.Nombre || "").split(/\s+/).length > 3) safe.Nombre = "";
    if (!isLikelyValidSurname(safe.Apellidos || "")) safe.Apellidos = "";
  } else {
    if (!isLikelyValidName(safe.Nombre || "") || (safe.Nombre || "").split(/\s+/).length > 3) safe.Nombre = "";
    if (!isLikelyValidSurname(safe.Apellidos || "")) safe.Apellidos = "";
  }

  if (!isLikelyValidNationality(safe.Nacionalidad || "") || (safe.Nacionalidad || "").length > 24) {
    safe.Nacionalidad = coreTrusted ? safe.Nacionalidad : "";
  }

  if (!isLikelyValidPlace(safe["Lugar de nacimiento"] || "")) {
    safe["Lugar de nacimiento"] = "";
  }
  if (!isLikelyValidAddress(safe.Domicilio || "")) {
    safe.Domicilio = "";
  }
  if (!isLikelyValidParents(safe["Nombre de los Padres"] || "") || isClearlyBadParentsValue(safe["Nombre de los Padres"] || "")) {
    safe["Nombre de los Padres"] = "";
  }

  return safe;
}

async function processOCR(ocr){
  if(!ocr.trim()){ alert("No hay texto OCR para procesar."); return; }
  const docEl = document.getElementById('Doc');
  if (docEl){
    docEl.value = ocr;
    expediente.doc = ocr;
  }
  const parsed = await parseOCRToFields(ocr);
  fillFormFromParsed(parsed);
}

function parseOCRToFieldsBase(ocr){
  const parsed = parseByRules(ocr);
  const ai = miniAIInterpretFields(ocr);
  const merged = sanitizeParsedObjectFields(mergeParsedWithMiniAI(parsed, ai));
  const idespBlock = parseSpanishIdespBlockFromOCR(ocr);
  const mrzIdentity = extractMrzIdentityFromOCR(ocr);
  const labeledBlocks = parseLabeledDocumentBlocks(ocr);

  if (idespBlock){
    merged["Tipo de documento"] = idespBlock["Tipo de documento"] || merged["Tipo de documento"];
    merged["NВә Documento"] = idespBlock["NВә Documento"] || merged["NВә Documento"];
    merged["Fecha de nacimiento"] = idespBlock["Fecha de nacimiento"] || merged["Fecha de nacimiento"];
    merged.Sexo = idespBlock.Sexo || merged.Sexo;
    merged.Nacionalidad = idespBlock.Nacionalidad || merged.Nacionalidad;
    if (idespBlock.Nombre) merged.Nombre = idespBlock.Nombre;
    if (idespBlock.Apellidos) merged.Apellidos = idespBlock.Apellidos;
  }

  if (labeledBlocks["Lugar de nacimiento"]) {
    merged["Lugar de nacimiento"] = labeledBlocks["Lugar de nacimiento"];
  }
  if (labeledBlocks.Domicilio) {
    merged.Domicilio = labeledBlocks.Domicilio;
  }
  if (labeledBlocks["Nombre de los Padres"]) {
    merged["Nombre de los Padres"] = labeledBlocks["Nombre de los Padres"];
  }

  if (idespBlock){
    if (idespBlock.Nombre) merged.Nombre = idespBlock.Nombre;
    if (idespBlock.Apellidos) merged.Apellidos = idespBlock.Apellidos;
  }

  if (mrzIdentity){
    const currentName = normalize(merged.Nombre || "");
    const currentSurname = normalize(merged.Apellidos || "");
    const looksPlaceName =
      currentName === normalize("ARONA") ||
      currentName === normalize("FRONTERA") ||
      currentName === normalize("ADEJE") ||
      currentName === normalize("SANTA CRUZ DE TENERIFE") ||
      currentName === normalize("SAN CRISTOBAL DE LA LAGUNA");

    if (!isLikelyValidName(merged.Nombre || "") || looksPlaceName) merged.Nombre = mrzIdentity.Nombre;
    if (!isLikelyValidSurname(merged.Apellidos || "") || /IDESP|MEP/.test(currentSurname)) merged.Apellidos = mrzIdentity.Apellidos;
  }

  const parsedLooksTrusted =
    isLikelyValidDoc(parsed["NВә Documento"] || "") &&
    isLikelyValidDate(parsed["Fecha de nacimiento"] || "");

  if (parsedLooksTrusted){
    if (!idespBlock && isLikelyValidName(parsed.Nombre || "")) merged.Nombre = sanitizeParsedFieldValue("Nombre", parsed.Nombre);
    if (!idespBlock && isLikelyValidName(parsed.Apellidos || "")) merged.Apellidos = sanitizeParsedFieldValue("Apellidos", parsed.Apellidos);
    if ((parsed.Sexo || "") === "MASCULINO" || (parsed.Sexo || "") === "FEMENINO") merged.Sexo = parsed.Sexo;
    if (isLikelyValidNationality(parsed.Nacionalidad || "")) merged.Nacionalidad = sanitizeParsedFieldValue("Nacionalidad", parsed.Nacionalidad);
  }

  const mergedLooksTrusted =
    isLikelyValidDoc(merged["NВә Documento"] || "") &&
    isLikelyValidDate(merged["Fecha de nacimiento"] || "");

  if (!mergedLooksTrusted){
    if (!isLikelyValidName(merged.Nombre || "") || (merged.Nombre || "").split(/\s+/).length > 3) merged.Nombre = "";
    if (!isLikelyValidName(merged.Apellidos || "") || (merged.Apellidos || "").split(/\s+/).length > 4) merged.Apellidos = "";
    if (!isLikelyValidNationality(merged.Nacionalidad || "") || (merged.Nacionalidad || "").length > 24) merged.Nacionalidad = "";
    if (!isLikelyValidPlace(merged["Lugar de nacimiento"] || "")) merged["Lugar de nacimiento"] = "";
    if (!isLikelyValidAddress(merged.Domicilio || "")) merged.Domicilio = "";
  }

  if (!isLikelyValidParents(merged["Nombre de los Padres"] || "")) merged["Nombre de los Padres"] = "";

  return merged;
}

async function parseOCRToFields(ocr){
  const ruleBase = parseOCRToFieldsBase(ocr);
  const idespBlock = parseSpanishIdespBlockFromOCR(ocr) || {};
  const labeledBlocks = parseLabeledDocumentBlocks(ocr);
  const aiPrimary = await extractPrimaryFieldsWithLocalAI(ocr);
  lastAIDebug = {
    model: LOCAL_FIELD_MODEL,
    enabled: true,
    primary: { ...aiPrimary }
  };

  const merged = sanitizeParsedObjectFields({
    ...ruleBase,
    ...aiPrimary
  });

  if (idespBlock["Tipo de documento"]) merged["Tipo de documento"] = idespBlock["Tipo de documento"];
  if (idespBlock["NВә Documento"]) merged["NВә Documento"] = idespBlock["NВә Documento"];
  if (idespBlock["Fecha de nacimiento"]) merged["Fecha de nacimiento"] = idespBlock["Fecha de nacimiento"];
  if (idespBlock.Sexo) merged.Sexo = idespBlock.Sexo;
  if (idespBlock.Nacionalidad) merged.Nacionalidad = idespBlock.Nacionalidad;
  if (idespBlock.Nombre) merged.Nombre = idespBlock.Nombre;
  if (idespBlock.Apellidos) merged.Apellidos = idespBlock.Apellidos;

  const finalBlocks = parseLabeledDocumentBlocks(ocr);
  if (finalBlocks["Lugar de nacimiento"] && !isLikelyValidPlace(merged["Lugar de nacimiento"] || "")) merged["Lugar de nacimiento"] = finalBlocks["Lugar de nacimiento"];
  if (finalBlocks.Domicilio && !isLikelyValidAddress(merged.Domicilio || "")) merged.Domicilio = finalBlocks.Domicilio;
  if (finalBlocks["Nombre de los Padres"] && (!isLikelyValidParents(merged["Nombre de los Padres"] || "") || isClearlyBadParentsValue(merged["Nombre de los Padres"] || ""))) {
    merged["Nombre de los Padres"] = finalBlocks["Nombre de los Padres"];
  }
  if (!merged.Nombre && isLikelyValidName(ruleBase.Nombre || "")) merged.Nombre = ruleBase.Nombre;
  if (!merged.Apellidos && isLikelyValidSurname(ruleBase.Apellidos || "")) merged.Apellidos = ruleBase.Apellidos;
  if (!merged["Lugar de nacimiento"] && labeledBlocks["Lugar de nacimiento"]) merged["Lugar de nacimiento"] = labeledBlocks["Lugar de nacimiento"];
  if (!merged.Domicilio && labeledBlocks.Domicilio) merged.Domicilio = labeledBlocks.Domicilio;

  return enforceSafeOutput(merged);
}

function formatParsedFieldsBlock(parsed){
  const fields = [
    ["NOMBRE", parsed.Nombre || ""],
    ["APELLIDOS", parsed.Apellidos || ""],
    ["TIPO DE DOCUMENTO", parsed["Tipo de documento"] || ""],
    ["NВә DOCUMENTO", parsed["NВә Documento"] || ""],
    ["SEXO", parsed.Sexo || ""],
    ["NACIONALIDAD", parsed.Nacionalidad || ""],
    ["NOMBRE DE LOS PADRES", parsed["Nombre de los Padres"] || ""],
    ["FECHA DE NACIMIENTO", parsed["Fecha de nacimiento"] || ""],
    ["LUGAR DE NACIMIENTO", parsed["Lugar de nacimiento"] || ""],
    ["DOMICILIO", parsed.Domicilio || ""]
  ];
  const baseBlock = fields.map(([label, value]) => `${label}: ${value}`).join("\n");
  const aiDebug = lastAIDebug ? [
    "",
    "IA LOCAL:",
    `MODELO: ${lastAIDebug.model || ""}`,
    `ACTIVA: ${lastAIDebug.enabled ? "SI" : "NO"}`,
    `IA NOMBRE: ${lastAIDebug.primary?.Nombre || ""}`,
    `IA APELLIDOS: ${lastAIDebug.primary?.Apellidos || ""}`,
    `IA PADRES: ${lastAIDebug.primary?.["Nombre de los Padres"] || ""}`,
    `IA LUGAR: ${lastAIDebug.primary?.["Lugar de nacimiento"] || ""}`,
    `IA DOMICILIO: ${lastAIDebug.primary?.Domicilio || ""}`
  ].join("\n") : "";
  return `${baseBlock}${aiDebug}`;
}

function appendBatchResult(index, fileName, ocr, parsed){
  const docEl = document.getElementById('Doc');
  if (!docEl) return;
  const parts = [
    `========== DOCUMENTO ${index} / ${fileName || "sin_nombre"} ==========`,
    "OCR BRUTO:",
    ocr || "",
    "",
    "PARSEO:",
    formatParsedFieldsBlock(parsed),
    ""
  ];
  const block = parts.join("\n");
  docEl.value = docEl.value ? `${docEl.value}\n\n${block}` : block;
  expediente.doc = docEl.value;
}

  const f = getFormAsFiliacion();
  const anyVal = Object.values(f).some(v => (v||"").trim()!=="");

      "Pulsa 'Agregar filiaciГіn' o limpia la ficha antes de descargar."
    );
    return;
  }

  expediente.doc = document.getElementById('Doc').value || expediente.doc || "";
  const data = { doc: expediente.doc, filiaciones: expediente.filiaciones };

  const password = prompt("Introduce una frase de paso para cifrar el expediente (mГӯnimo 8 caracteres):");
  if (!password) return;
  if (password.length < 8){
    alert("Frase de paso demasiado corta. Usa al menos 8 caracteres.");
    return;
  }

  try{
    const cipherBase64 = await encryptJSON(data, password);
    const blob = new Blob([cipherBase64], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const d = new Date(); const pad = n => String(n).padStart(2,'0');
    const fname = `Proyecto ${pad(d.getHours())}-${pad(d.getMinutes())} ${pad(d.getDate())}_${pad(d.getMonth()+1)}_${d.getFullYear()}.enc`;
    const a = document.createElement('a');
    a.href = url;
    a.download = fname;
    a.click();
    URL.revokeObjectURL(url);
  }catch(err){
    console.error("Error cifrando el expediente:", err);
    alert("No se ha podido cifrar el expediente.");
  }
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    const isLocalDev = location.hostname === '127.0.0.1' || location.hostname === 'localhost';
    if (isLocalDev){
      try{
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(reg => reg.unregister()));
      }catch(err){
        console.warn('SW cleanup error', err);
      }

      if (window.caches){
        try{
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }catch(err){
          console.warn('Cache cleanup error', err);
        }
      }
      return;
    }

    navigator.serviceWorker.register('./sw.js?v=dev2', { updateViaCache: 'none' })
      .catch(err => console.error('SW error', err));
  });
}
