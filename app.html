<script type="module">
import { PROVINCIAS_ES } from './provincias_es.js';

const IS_LOCAL_DEV = location.hostname === '127.0.0.1' || location.hostname === 'localhost';

if (!IS_LOCAL_DEV) {
  const manifestLink = document.createElement('link');
  manifestLink.rel = 'manifest';
  manifestLink.href = './manifest.webmanifest?v=dev3';
  document.head.appendChild(manifestLink);
}

// ======================================================
// FILIATRON вҖ” PARSER NS (1 sola lГӯnea, sin espacios)
// ======================================================

const expediente = { doc: "", filiaciones: [] };

const textEncoder = new TextEncoder();
const textDecoder = new TextDecoder();
const LOCAL_FIELD_MODEL = "semantic-local-lite";
const ENABLE_HEAVY_LOCAL_AI = false;
const OCR_MODELS = {
  detectionPath: new URL('./assets/ch_PP-OCRv4_det_infer.onnx', window.location.href).href,
  recognitionPath: new URL('./assets/ch_PP-OCRv4_rec_infer.onnx', window.location.href).href,
  dictionaryPath: new URL('./assets/ppocr_keys_v1.txt', window.location.href).href
};
let betterOCRPromise = null;
let ocrRunning = false;
let ocrPhaseLabel = "";
let ocrPhaseBase = 0;
let ocrPhaseSpan = 1;
let batchDocumentsProcessed = 0;
let lastAIDebug = null;
let nativeTextDetector = null;

async function loadBetterOCRModule(){
  const mod = await import('@gutenye/ocr-browser');
  return mod?.default || mod?.Ocr || mod;
}

function toBase64(arr){
  let str = "";
  for(let i=0;i<arr.length;i++) str += String.fromCharCode(arr[i]);
  return btoa(str);
}

function fromBase64(str){
  const bin = atob(str);
  const len = bin.length;
  const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function deriveKey(password, salt){
  const pwKey = await crypto.subtle.importKey(
    "raw",
    textEncoder.encode(password),
    { name: "PBKDF2" },
    false,
    ["deriveKey"]
  );

  return crypto.subtle.deriveKey(
    {
      name: "PBKDF2",
      salt: salt,
      iterations: 200000,
      hash: "SHA-256",
    },
    pwKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt","decrypt"]
  );
}

async function encryptJSON(obj, password){
  const jsonStr = JSON.stringify(obj);
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(password, salt);

  const cipherBuf = await crypto.subtle.encrypt(
    { name: "AES-GCM", iv },
    key,
    textEncoder.encode(jsonStr)
  );

  const cipherBytes = new Uint8Array(cipherBuf);
  const full = new Uint8Array(salt.length + iv.length + cipherBytes.length);
  full.set(salt, 0);
  full.set(iv, salt.length);
  full.set(cipherBytes, salt.length + iv.length);

  return toBase64(full);
}

async function decryptJSON(cipherBase64, password){
  const full = fromBase64((cipherBase64 || "").trim());
  if (full.length < 16 + 12 + 1) throw new Error("Datos insuficientes");

  const salt = full.slice(0, 16);
  const iv   = full.slice(16, 28);
  const data = full.slice(28);

  const key = await deriveKey(password, salt);

  const plainBuf = await crypto.subtle.decrypt(
    { name: "AES-GCM", iv },
    key,
    data
  );

  const jsonStr = textDecoder.decode(plainBuf);
  return JSON.parse(jsonStr);
}

// ---------- Helpers texto ----------
const tcase = s => (s||"").toLowerCase().replace(/\b([A-Za-zГҒГүГҚГ“ГҡГңГ‘ГЎГ©ГӯГіГәГјГұ])/g,c=>c.toUpperCase());
const normalize = s => (s||"").normalize('NFD').replace(/[\u0300-\u036f]/g, '').toUpperCase();
const normAZ = s => (s||"").normalize('NFD').replace(/[\u0300-\u036f]/g,'').toUpperCase()
  .replace(/[^A-ZГ‘ГҒГүГҚГ“ГҡГң\s-]/g,'').replace(/\s+/g,' ').trim();

// Construye NS (sin espacios) y mapa de Гӯndices a RAW
function buildNS(raw){
  const up0 = normalize(raw||"");
  // Normaliza variantes OCR del separador MRZ "<" (japonГ©s 'гҒҸ' y full-width 'пјң')
  const up = up0.replace(/гҒҸ/g,'<').replace(/пјң/g,'<');
  let NS = ""; const MAP = [];
  for (let i=0;i<up.length;i++){
    const ch = up[i];
    if (/\s/.test(ch)) continue;
    NS += ch; MAP.push(i);
  }
  return { NS, MAP, RAW: raw||"", UPROW: up };
}

// ---------- Distancia (fuzzy) ----------
function damerauLevenshtein(a,b,limit=2){
  a=a||""; b=b||""; if(a===b) return 0; if(!a||!b) return Math.min(limit+1, Math.max(a.length,b.length));
  const al=a.length, bl=b.length; if (Math.abs(al-bl)>limit) return limit+1;
  const dp=Array.from({length:al+1},()=>Array(bl+1).fill(0));
  for(let i=0;i<=al;i++) dp[i][0]=i; for(let j=0;j<=bl;j++) dp[0][j]=j;
  for(let i=1;i<=al;i++){
    let minRow=limit+1;
    for(let j=1;j<=bl;j++){
      const cost=a[i-1]===b[j-1]?0:1;
      let v=Math.min(dp[i-1][j]+1, dp[i][j-1]+1, dp[i-1][j-1]+cost);
      if(i>1&&j>1&&a[i-1]===b[j-2]&&a[i-2]===b[j-1]) v=Math.min(v, dp[i-2][j-2]+1);
      dp[i][j]=v; if(v<minRow) minRow=v;
    }
    if(minRow>limit) return limit+1;
  }
  return dp[al][bl];
}

// --- Helper: localizar etiqueta con hasta 2 errores OCR (aprox) ---
function findApproxTag(ns, tag, maxDist = 2) {
  const T = tag.toUpperCase().replace(/\s+/g,'');
  const L = T.length;
  let best = { idx: -1, d: maxDist + 1 };
  for (let i = 0; i <= ns.length - L; i++) {
    const win = ns.slice(i, i + L);
    const d = damerauLevenshtein(win, T, maxDist);
    if (d <= maxDist && (d < best.d || best.idx === -1)) {
      best = { idx: i, d };
      if (d === 0) break;
    }
  }
  return best.idx;
}

// ---------- LibrerГӯas (municipios / provincias / nombres) ----------
let MUNICIPIOS_SET = new Set([
  // Fallback mГӯnimo (por si fetch falla en file://)
  "MADRID","ALCOBENDAS","BARCELONA","VALENCIA","SEVILLA","MALAGA","MURCIA",
  "SANTA CRUZ DE TENERIFE","LAS PALMAS","ARONA","ADEJE","TELDE","VIGO","OVIEDO","GIJON","BILBAO","VALLADOLID","SALAMANCA","TOLEDO"
].map(normalize));

let MUNICIPIOS_NOSPACE = new Map([...MUNICIPIOS_SET].map(m => [m.replace(/\s+/g,''), m]));

const PROVINCIAS = PROVINCIAS_ES.map(normalize);
const PROV_SET = new Set(PROVINCIAS);
const PROV_NOSPACE = new Map([...PROV_SET].map(p => [p.replace(/\s+/g,''), p]));

let NOMBRES_SET = new Set(); // se cargarГЎ de nombres.json si se puede

async function initMunicipios(){
  try{
    const res = await fetch(new URL('/municipios.json', window.location.origin), {cache:'no-store'});
    if (!res.ok) throw new Error('HTTP '+res.status);
    const arr = await res.json();
    if (Array.isArray(arr) && arr.length){
      MUNICIPIOS_SET = new Set(arr.map(x => normalize(String(x))));
      MUNICIPIOS_NOSPACE = new Map([...MUNICIPIOS_SET].map(m => [m.replace(/\s+/g,''), m]));
      console.log(`Municipios cargados: ${MUNICIPIOS_SET.size}`);
    }
  }catch(e){
    console.warn('municipios.json no accesible (Вҝfile:// / CORS?). Uso fallback.', e);
  }
}
async function initNombres(){
  try{
    const res = await fetch(new URL('/nombres.json', window.location.origin), {cache:'no-store'});
    if (!res.ok) throw new Error('HTTP '+res.status);
    const arr = await res.json();
    if (Array.isArray(arr) && arr.length){
      // nombres.json tiene lГӯneas tipo "AARON,21540,11.0" o nombres compuestos
      // extrae solo el campo de nombre (antes de la primera coma)
      const list = arr.map(line => String(line).split(',')[0]).filter(Boolean);
      NOMBRES_SET = new Set(list.map(normalize));
      console.log(`Nombres cargados: ${NOMBRES_SET.size}`);
    }
  }catch(e){
    console.warn('nombres.json no accesible (Вҝfile:// / CORS?). Padres quedarГЎn en duda si no hay set.', e);
  }
}

// ---------- Matching municipio / provincia ----------
function matchMunicipioSuffixNS(ns){
  if (!ns || !MUNICIPIOS_NOSPACE.size) return null;
  const maxLen = Math.min(32, ns.length);
  for (let len = maxLen; len >= 4; len--) {
    const sub = ns.slice(ns.length - len);
    const hit = MUNICIPIOS_NOSPACE.get(sub);
    if (hit) return { canon: hit, index: ns.length - len };
  }
  return null;
}
function findProvinceAfter(ns, start=0){
  if (!ns) return null;
  let best = null;
  for (const [pNS, canon] of PROV_NOSPACE.entries()){
    const idx = ns.indexOf(pNS, start);
    if (idx !== -1){
      if (!best || idx < best.index || (idx === best.index && pNS.length > best.pNS.length)){
        best = { index: idx, canon, pNS };
      }
    }
  }
  return best;
}
function matchMunicipio(raw){
  const cand = normAZ(raw);
  const can  = normalize(cand);
  if (MUNICIPIOS_SET.has(can)) return {canon:cand, approx:false, found:true};
  const compact = can.replace(/\s+/g, '');
  const direct = MUNICIPIOS_NOSPACE.get(compact);
  if (direct) return {canon: direct, approx:false, found:true};
  if (can.length < 5) return {canon:cand, approx:false, found:false};
  let best=null, bestD=2;
  for (const m of MUNICIPIOS_SET){
    if (m[0] !== can[0]) continue;
    const d = damerauLevenshtein(can, m, 2);
    if (d<bestD){ bestD=d; best=m; if (d===0) break; }
  }
  if (best!=null && bestD<=1) return {canon: best.replace(/\s+/g,' ').trim(), approx:true, found:true};
  return {canon:cand, approx:false, found:false};
}

// ---------- MRZ helpers ----------
function mapDigit(ch){
  if (/[0-9]/.test(ch)) return ch;
  const t = ch.toUpperCase();
  if (t==='O'||t==='Q') return '0';
  if (t==='I'||t==='L') return '1';
  if (t==='Z') return '2';
  if (t==='S') return '5';
  if (t==='B') return '8';
  return '0';
}

// ---------- Parser principal (NS) ----------
function parseByRules(ocrRaw){
  // --- construir NS y, si empieza por EQUIPO, recortar hasta DOMICILIO ---
  {
    const built = buildNS(ocrRaw);
    let NS0 = built.NS, MAP0 = built.MAP, RAW0 = built.RAW;

    // Si la cadena NS empieza con EQUIPO... eliminar "EQUIPO" + alfanumГ©rico hasta "DOMICILIO"
    if (NS0.startsWith('EQUIPO')) {
      const idxDomStart = NS0.indexOf('DOMICILIO');
      if (idxDomStart !== -1) {
        NS0  = NS0.slice(idxDomStart);
        MAP0 = MAP0.slice(idxDomStart); // mantiene alineado el mapeo RAW
      }
    }

    // Exponer a la funciГіn con los mismos nombres que usas abajo
    var NS = NS0, MAP = MAP0, RAW = RAW0;
  }

  // Anclajes
  // Normaliza confusiones OCR 1/lвҶ’I, 0/OвҶ’O, 5вҶ’S, Q/CвҶ’D (reemplazo 1:1, mantiene Гӯndice)
  const canonNS = NS.replace(/[l1]/g,'I').replace(/[0пјҜ]/g,'O').replace(/5/g,'S').replace(/[QC]/g,'D');

  // IDESP robusto con variantes OCR (I/1/L)(D/Q/C/O/0)E(S/5)P  + casos IOESP/IOSEP
  const idxIDESP = (() => {
    const hits = [];

    // 1) patrГіn general con confusiones
    const rx = /[IL1](?:D|Q|C|O|0)E(?:S|5)P/g;
    for (const m of canonNS.matchAll(rx)) hits.push(m.index);

    // 2) casos explГӯcitos histГіricos
    const a = canonNS.indexOf('IOESP'); if (a !== -1) hits.push(a);
    const b = canonNS.indexOf('IOSEP'); if (b !== -1) hits.push(b);

    if (!hits.length) return -1;
    return Math.min(...hits);
  })();

  const idxEQUIPO = NS.indexOf('EQUIPO');
  const idxDOM = NS.indexOf('DOMICILIO');

  // Etiqueta de nacimiento (exacta primero)
  let idxLUG = (()=>{ 
    const a=NS.indexOf('LUGARDENACIMIENTO'); 
    if (a!==-1) return a; 
    return NS.indexOf('LAGARDENACIMIENTO');
  })();

  // Si no se encontrГі exacto, admite hasta 2 errores OCR
  if (idxLUG === -1) {
    const alt1 = findApproxTag(NS, 'LUGARDE NACIMIENTO', 2);
    const alt2 = findApproxTag(NS, 'LAGARDE NACIMIENTO', 2);
    idxLUG = (alt1 !== -1) ? alt1 : (alt2 !== -1 ? alt2 : -1);
  }

  const gStop = [idxIDESP, idxEQUIPO].filter(i=>i!==-1).reduce((m,i)=>Math.min(m,i), NS.length);

  // --- DOMICILIO ---
  let domicilio = "", domicilioUncertain = true;
  if (idxDOM !== -1){
    const start = idxDOM + 'DOMICILIO'.length;
    const aLUG = idxLUG === -1 ? Infinity : idxLUG;
    const aEQ  = idxEQUIPO === -1 ? Infinity : idxEQUIPO;
    const aID  = idxIDESP === -1 ? Infinity : idxIDESP;
    const pv   = findProvinceAfter(NS, start);
    const anchorEnd = Math.min(aLUG, aEQ, aID, NS.length);
    const end = (pv && pv.index < anchorEnd) ? pv.index : anchorEnd;

    let domNS = NS.slice(start, end).trim();
    const suf = matchMunicipioSuffixNS(domNS);

    // reconstruir calle legible
    const rawStart = MAP[start] ?? 0;
    const rawEndStreet = (suf ? MAP[start + suf.index - 1] : MAP[end - 1]) ?? MAP[MAP.length-1];
    let street = RAW.slice(rawStart, (rawEndStreet ?? rawStart)+1)
      .replace(/\s*,\s*/g, ', ')
      .replace(/\.([A-Za-zГҒГүГҚГ“ГҡГңГ‘])/g, '. $1')
      .replace(/([A-Za-zГҒГүГҚГ“ГҡГңГ‘])(\d)/g, '$1 $2')
      .replace(/(\d)([A-Za-zГҒГүГҚГ“ГҡГңГ‘])/g, '$1 $2')
      .replace(/\s{2,}/g,' ')
      .trim();

    if (suf){
      domicilio = `${street}, ${tcase(suf.canon)}`;
      domicilioUncertain = false;
    } else {
      domicilio = street;
    }
  }

  // --- LUGAR NACIMIENTO ---
  let lugarNac = "", lugarUncertain = true;
  if (idxLUG !== -1){
    const start = idxLUG + (NS.startsWith('LUGARDENACIMIENTO', idxLUG) ? 'LUGARDENACIMIENTO'.length : 'LAGARDENACIMIENTO'.length);
    const aH  = (()=>{ const i=NS.indexOf('HIJOADE', start); return i!==-1?i:Infinity;})();
    const aID = idxIDESP !== -1 ? idxIDESP : Infinity;
    const aEQ = idxEQUIPO !== -1 ? idxEQUIPO : Infinity;
    const pv  = findProvinceAfter(NS, start);
    // no invadir el "DE" de padres
    const idxH = NS.indexOf('HIJOADE', start);
    const limitDE = (idxH!==-1) ? (NS.indexOf('DE', idxH+'HIJOADE'.length) || Infinity) : Infinity;

    const anchorEnd = Math.min(aH, aID, aEQ, NS.length, limitDE);
    const end = (pv && pv.index < anchorEnd) ? pv.index : anchorEnd;

    let seg = NS.slice(start, end);
    const cutNum = seg.search(/[0-9]/); if (cutNum !== -1) seg = seg.slice(0, cutNum);

    const mun = matchMunicipio(seg);
    if (pv){
      const prov = tcase(pv.canon);
      const mc = mun.found ? tcase(mun.canon) : tcase(seg);
      lugarUncertain = false;
      lugarNac = (!seg || normalize(mc)===normalize(pv.canon)) ? prov : `${mc}, ${prov}`;
    }else{
      lugarNac = mun.found ? tcase(mun.canon) : tcase(seg);
      if (!(mun.found && !mun.approx)) lugarUncertain = true;
    }
  }

  // --- PADRES (corte por 'ADE' вҶ’ IDESP; usa librerГӯa, no peta; descompone nombres pegados) ---
  let padres = "", padresUncertain = true;
  {
    const hasName = (tok)=>{
      if (!tok) return false;
      if (!NOMBRES_SET || NOMBRES_SET.size === 0) return false;
      return NOMBRES_SET.has(normalize(tok));
    };

    if (idxIDESP !== -1){
      // Buscar anclaje 'ADE' robusto (A[ D/Q/C/O/0 ]?E) sobre NS (sin espacios), antes de IDESP; ordenados
      const adeIdxs = (()=> {
        const out = [];
        const rx = /A[ DQCO0O]?E/g; // ADE, AOE, A0E, AQE, ACE y AE
        rx.lastIndex = 0;
        let m;
        while ((m = rx.exec(NS))) {
          const i = m.index;
          if (idxIDESP !== -1 && i < idxIDESP) out.push(i);
          if (idxIDESP !== -1 && i >= idxIDESP) break;
        }
        out.sort((a,b)=>a-b);
        return out;
      })();

      let candidates = adeIdxs;
      if (idxLUG !== -1){
        const afterLugar = adeIdxs.filter(i => i > idxLUG);
        if (afterLugar.length) candidates = afterLugar;
      }

      const extractPair = (segNS)=>{
        let seg = (segNS||"").replace(/[0-9]+/g,'').replace(/[\/\|_!ВЎ]+/g,'I');

        const deco = (s)=>{
          if (!s) return "";
          if (hasName(s)) return tcase(s);
          const C = s;
          for (let k=2; k<=Math.min(12, C.length-2); k++){
            const A = C.slice(0,k), B = C.slice(k);
            if (hasName(A) && hasName(B)) return `${tcase(A)} ${tcase(B)}`;
          }
          return "";
        };

        for (let j=1;j<seg.length-1;j++){
          if (seg[j] !== 'I') continue;
          const L = seg.slice(0,j), R = seg.slice(j+1);
          const Ld = deco(L), Rd = deco(R);
          if (Ld && Rd) return `${Ld} y ${Rd}`;
        }

        const compact = seg.replace(/I+/g,'');
        for (let m=2;m<=Math.min(24, compact.length-2);m++){
          const L = compact.slice(0,m), R = compact.slice(m);
          const Ld = deco(L), Rd = deco(R);
          if (Ld && Rd) return `${Ld} y ${Rd}`;
        }

        const toks = seg.split(/I+/).filter(Boolean);
        for (let a=0;a<toks.length;a++){
          for (let b=a+1;b<toks.length;b++){
            const Ld = deco(toks[a]), Rd = deco(toks[b]);
            if (Ld && Rd) return `${Ld} y ${Rd}`;
          }
        }
        return "";
      };

      if (candidates.length){
        const iADE = candidates[candidates.length - 1];
        const segNS = NS.slice(iADE + 3, idxIDESP);
        const pair = extractPair(segNS);
        if (pair){
          padres = pair; padresUncertain = false;
        } else {
          padres = ""; padresUncertain = true;
        }
      } else if (idxLUG !== -1){
        const start = idxLUG + (NS.startsWith('LUGARDENACIMIENTO', idxLUG) ? 'LUGARDENACIMIENTO'.length : 'LAGARDENACIMIENTO'.length);
        if (start < idxIDESP){
          const segNS = NS.slice(start, idxIDESP);
          const pair = extractPair(segNS);
          if (pair){
            padres = pair; padresUncertain = false;
          } else {
            padres = ""; padresUncertain = true;
          }
        }
      }

      if (padres){
        const parts = padres.split(/\s+y\s+/i);
        if (parts.length===2){
          const badA = PROV_SET.has(normalize(parts[0])) || MUNICIPIOS_SET.has(normalize(parts[0]));
          const badB = PROV_SET.has(normalize(parts[1])) || MUNICIPIOS_SET.has(normalize(parts[1]));
          if (badA || badB) padresUncertain = true;
        }
      }
    }
  }

  // --- PARCHE ГҡNICO: Provincia como final inclusivo + backfill DOMICILIO si falta ---
  (function(){
    // Helper: Гәltima provincia ANTES de un Гӯndice dado en NS
    function lastProvinceBefore(limitIdx){
      let last = null;
      for (const [pNS, canon] of PROV_NOSPACE.entries()){
        const i = NS.lastIndexOf(pNS, limitIdx);
        if (i !== -1 && i <= limitIdx){
          if (!last || i > last.index || (i === last.index && pNS.length > last.pNS.length)){
            last = { index: i, canon, pNS };
          }
        }
      }
      return last;
    }

    // 1) NACIMIENTO: si idxLUG vГЎlido y cГЎlculo previo vacГӯo o en duda,
    // usa la PRIMERA provincia DESPUГүS de idxLUG como final inclusivo.
    if (idxLUG !== -1 && (!lugarNac || lugarUncertain)) {
      const start = idxLUG + (NS.startsWith('LUGARDENACIMIENTO', idxLUG) ? 'LUGARDENACIMIENTO'.length : (NS.startsWith('LAGARDENACIMIENTO', idxLUG) ? 'LAGARDENACIMIENTO'.length : 0));
      if (start > idxLUG) {
        const pv = findProvinceAfter(NS, start);
        if (pv) {
          // recorta hasta provincia (inclusiva)
          const rawStart = MAP[start] ?? 0;
          const rawEnd   = MAP[pv.index + pv.pNS.length - 1] ?? (MAP[MAP.length-1] || RAW.length-1);
          const segRaw   = RAW.slice(rawStart, rawEnd + 1);
          // normaliza
          const clean = segRaw.replace(/\s{2,}/g,' ').trim();
          const municipioGuess = matchMunicipio(clean);
          const provName = tcase(pv.canon);
          if (municipioGuess.found) {
            lugarNac = (normalize(municipioGuess.canon) === normalize(pv.canon))
              ? provName
              : `${tcase(municipioGuess.canon)}, ${provName}`;
          } else {
            lugarNac = `${tcase(clean.replace(/\s*,\s*/g, ', '))}`.replace(/\s+,/g, ',');
          }
          lugarUncertain = false;
        }
      }
    }

    // 2) DOMICILIO: si NO hay DOMICILIO claro (vacГӯo o incierto) y SГҚ hay idxLUG,
    // toma la ГҡLTIMA provincia ANTES de idxLUG como fin inclusivo, y busca hacia atrГЎs
    // un token de vГӯa razonable (o 'DOMICILIO' si existiera).
    if (( !domicilio || domicilioUncertain ) && idxLUG !== -1) {
      const pvPrev = lastProvinceBefore(idxLUG - 1);
      if (pvPrev) {
        // punto final inclusivo en RAW
        const rawEnd = MAP[pvPrev.index + pvPrev.pNS.length - 1] ?? (MAP[MAP.length-1] || RAW.length-1);
        // busca inicio en RAW hacia atrГЎs: DOMICILIO o tokens de vГӯa
        const rawSearch = RAW.slice(0, rawEnd + 1);
        const viaRx = /(DOMICILIO|C\.\s*|AVDA|AVENIDA|CL\s|CALLE|PASEO|PSO)/gi;
        let m, lastMatch = null;
        while ((m = viaRx.exec(rawSearch))) lastMatch = m;
        if (lastMatch) {
          const rawStart = Math.max(0, lastMatch.index + (lastMatch[1].toUpperCase()==='DOMICILIO' ? 'DOMICILIO'.length : 0));
          let seg = RAW.slice(rawStart, rawEnd + 1)
            .replace(/\s*,\s*/g, ', ')
            .replace(/\s{2,}/g,' ')
            .trim();
          // engancha municipio y provincia si se reconocen
          const muni = matchMunicipio(seg);
          const provName = tcase(pvPrev.canon);
          if (muni.found && normalize(muni.canon) !== normalize(pvPrev.canon)) {
            if (!new RegExp(provName.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\s*$','i').test(seg)) {
              seg = `${tcase(muni.canon)}, ${provName}`;
            }
          } else if (!/,\s*[A-ZГҒГүГҚГ“ГҡГңГ‘ ]+$/.test(seg)) {
            seg = `${seg.replace(/\s+,/g, ',')}, ${provName}`;
          }
          domicilio = seg;
          domicilioUncertain = false;
        }
      }
    }
  })();

  // --- MRZ (L1/L2/L3) (SE MANTIENE IGUAL) ---
  let MRZ_L1 = "", MRZ_L2 = "", MRZ_L3 = "";
  if (idxIDESP !== -1) {
    // L1: desde IDESP hasta el PRIMER "<<<" que siga
    const firstArrows = NS.indexOf('<<<', idxIDESP);
    if (firstArrows !== -1) {
      MRZ_L1 = NS.slice(idxIDESP, firstArrows);

      // L2: buscar patrГіn YYMMDD? + sexo [MF] en una VENTANA limitada tras el primer "<<<"
      const winEnd = Math.min(NS.length, firstArrows + 180);
      const winL2 = NS.slice(firstArrows + 3, winEnd);
      const mL2 = winL2.match(/([0-9A-Z]{2})([0-9A-Z]{2})([0-9A-Z]{2}).([MF])/);
      if (mL2) MRZ_L2 = mL2[0];

      // L3: tras "ESP" si existe; si no, tras la misma ventana; NO exige segundo "<<<"
      const idxESPwin = winL2.indexOf('ESP');
      let afterIdxAbs = firstArrows + 3;
      if (idxESPwin !== -1) afterIdxAbs = firstArrows + 3 + idxESPwin + 3;

      const nextArrows = NS.indexOf('<<<', afterIdxAbs);
      let l3Start = (nextArrows !== -1) ? nextArrows + 3 : afterIdxAbs;

      while (l3Start < NS.length && !/[A-Z<]/.test(NS[l3Start])) l3Start++;
      MRZ_L3 = NS.slice(l3Start, Math.min(NS.length, l3Start + 120));
    }
  }

  // NВә doc desde L1/L2
  function docFromL1L2(l1,l2){
    if (!l1) return "";
    const m = l1.match(/<{3,}/);
    if (m){ const idx=m.index; if (idx>=9) return l1.slice(idx-9, idx).toUpperCase(); }
    if (l2){ const clean=l1.replace(/</g,''); if (clean.length>=9) return clean.slice(-9).toUpperCase(); }
    return "";
  }
  let numDoc = docFromL1L2(MRZ_L1, MRZ_L2);

  // Fecha y sexo desde L2 (mapDigit para confusiones)
  let fechaNac="", sexo="";
  if (MRZ_L2){
    const m = MRZ_L2.match(/([0-9A-Z]{2})([0-9A-Z]{2})([0-9A-Z]{2}).([MF])/);
    if (m){
      const yy = parseInt(mapDigit(m[1][0]) + mapDigit(m[1][1]),10);
      const mm = mapDigit(m[2][0]) + mapDigit(m[2][1]);
      const dd = mapDigit(m[3][0]) + mapDigit(m[3][1]);
      const year = yy >= 30 ? 1900 + yy : 2000 + yy;
      fechaNac = `${dd}/${mm}/${year}`;
      sexo = m[4] === 'F' ? 'FEMENINO' : 'MASCULINO';
    }
  }
// --- PATCH DE CORRECCIГ“N MRZ: limitar lectura a la zona antes del siguiente "ESP" o "<<<" ---
(function(){
  if (!MRZ_L1 && !MRZ_L2) return;

  // 1. Corregir NВә Documento si IDESP contiene la secuencia correcta
  if (idxIDESP !== -1 && (!numDoc || numDoc.length < 8)) {
    const afterID = NS.slice(idxIDESP + 5, idxIDESP + 60); // mira los 60 caracteres tras IDESP
    const mDoc = afterID.match(/([A-Z0-9]{7,9})</); // DNI/NIE seguido de flecha
    if (mDoc) numDoc = mDoc[1].toUpperCase();
  }

  // 2. Corregir Fecha/Sexo si se detectan dentro de la lГӯnea posterior a IDESP
  if ((!fechaNac || !sexo) && idxIDESP !== -1) {
    const afterID = NS.slice(idxIDESP, idxIDESP + 120);
    const mL2 = afterID.match(/([0-9A-Z]{6})([MF])/);
    if (mL2) {
      const raw6 = mL2[1].split("").map(mapDigit).join("");
      const yy = parseInt(raw6.slice(0,2), 10);
      const mm = raw6.slice(2,4);
      const dd = raw6.slice(4,6);
      const year = yy >= 30 ? 1900 + yy : 2000 + yy;
      fechaNac = `${dd}/${mm}/${year}`;
      sexo = mL2[2] === 'F' ? 'FEMENINO' : 'MASCULINO';
    }
  }
})();
// === PATCH SOLO FECHA NAC (L2 = YYMMDD + check + M/F) ===
(function(){
  if (idxIDESP === -1) return;

  // si ya hay fecha vГЎlida (dd/mm/aaaa) y plausible, no tocamos
  const okFecha = f => /^\d{2}\/\d{2}\/\d{4}$/.test(f) &&
                       (m=>m>=1&&m<=12)(parseInt(f.slice(3,5),10)) &&
                       (d=>d>=1&&d<=31)(parseInt(f.slice(0,2),10));
  if (fechaNac && okFecha(fechaNac)) return;

  const firstArrows = NS.indexOf('<<<', idxIDESP);
  if (firstArrows === -1) return;

  // M/F mГЎs cercano hacia la izquierda desde el primer '<<<'
  let sexAt = -1;
  for (let p = firstArrows - 1; p >= idxIDESP; p--) {
    const ch = NS[p];
    if (ch === 'M' || ch === 'F') { sexAt = p; break; }
  }
  if (sexAt === -1) return;

  // L2: ... YYMMDD + check + (M/F)
  if (sexAt - 7 >= idxIDESP) {
    const raw7 = NS.slice(sexAt - 7, sexAt);        // 6 fecha + 1 check
    const raw6 = raw7.slice(0, 6).split('').map(mapDigit).join('');
    const yy = parseInt(raw6.slice(0,2), 10);
    const mm = parseInt(raw6.slice(2,4), 10);
    const dd = parseInt(raw6.slice(4,6), 10);
    if (mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31) {
      const year = yy >= 30 ? 1900 + yy : 2000 + yy;
      fechaNac = `${String(dd).padStart(2,'0')}/${String(mm).padStart(2,'0')}/${year}`;
    }
  }
})();
  // Nacionalidad
  let Nacionalidad = (MRZ_L1.includes('ESP') || MRZ_L2.includes('ESP')) ? "EspaГұa" : "";

  // Apellidos/Nombre desde L3 (sin dГӯgitos)
  let nombre="", apellidos="";
  if (MRZ_L3){
    const parts = MRZ_L3.split('<').filter(Boolean);
    const ap1 = (parts[0]||"").replace(/[0-9]/g,'');
    const ap2 = (parts[1]||"").replace(/[0-9]/g,'');
    const nom1= (parts[2]||"").replace(/[0-9]/g,'');
    const nom2= (parts[3]||"").replace(/[0-9]/g,'');
    apellidos = [ap1,ap2].filter(Boolean).join(' ').trim().toUpperCase();
    nombre = tcase([nom1,nom2].filter(Boolean).join(' ').trim());
  }

  // SanitizaciГіn final
  const sanitize = s => (s||"").replace(/^[\s:.,-]+|[\s:.,-]+$/g,'').replace(/\s{2,}/g,' ').trim();
  let out = {
    Nombre: tcase(sanitize(nombre)),
    Apellidos: sanitize(apellidos).toUpperCase(),
    "Tipo de documento": "DNI",
    "NВә Documento": sanitize(numDoc||""),
    Sexo: sanitize(sexo),
    Nacionalidad: sanitize(Nacionalidad),
    "Nombre de los Padres": tcase(sanitize(padres)).replace(/\sY\s/g,' y '),
    "Fecha de nacimiento": sanitize(fechaNac),
    "Lugar de nacimiento": tcase(sanitize(lugarNac)),
    Domicilio: tcase(sanitize(domicilio)),
    _flags:{
      Nombre: !nombre,
      Apellidos: !apellidos,
      Padres: padresUncertain,
      Lugar: lugarUncertain,
      Domicilio: domicilioUncertain
    }
  };
  return out;
}

// ---------- Mini IA local: interpreta campos con reglas documentales ----------
function normalizeOCRTextForAI(text){
  return (text || "")
    .replace(/\r/g, "\n")
    .replace(/[ \t]+/g, " ")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}

function tokenizeOCRLines(text){
  return normalizeOCRTextForAI(text)
    .split("\n")
    .map((line, index) => ({ raw: line.trim(), index }))
    .filter(item => item.raw);
}

function canonicalOCRLine(line){
  return normalize(line || "")
    .replace(/гҒҸ/g, '<')
    .replace(/пјң/g, '<')
    .replace(/\s+/g, ' ')
    .trim();
}

function mrzify(line){
  return canonicalOCRLine(line)
    .replace(/\s+/g, '')
    .replace(/гҒҸ/g, '<')
    .replace(/пјң/g, '<');
}

function cleanLineForField(line){
  return (line || "")
    .replace(/^(APELLIDOS?|SURNAME|NOMBRES?|GIVEN\s+NAMES?|SEXO|SEX|NACIONALIDAD|NATIONALITY|DOMICILIO|ADDRESS|LUGAR\s+DE\s+NACIMIENTO|PLACE\s+OF\s+BIRTH|NACIMIENTO|FECHA\s+DE\s+NACIMIENTO|DATE\s+OF\s+BIRTH|HIJO\s+DE|PADRES?|PARENTS?)\s*[:\-]?\s*/i, "")
    .replace(/\s{2,}/g, " ")
    .trim();
}

const FIELD_SCHEMAS = {
  domicilio: {
    labels: ["DOMICILIO", "DOMICLO", "DOMICLIO", "ADDRESS"],
    stops: ["LUGAR DE NACIMIENTO", "PLACE OF BIRTH", "HIJO A DE", "PADRES", "PARENTS", "IDESP"]
  },
  lugar: {
    labels: ["LUGAR DE NACIMIENTO", "PLACE OF BIRTH", "NACIMIENTO"],
    stops: ["HIJO A DE", "PADRES", "PARENTS", "IDESP", "DOMICILIO"]
  },
  padres: {
    labels: ["HIJO A DE", "PADRES", "PARENTS"],
    stops: ["IDESP", "DOMICILIO", "LUGAR DE NACIMIENTO"]
  }
};

function normalizeAnchorToken(text){
  return canonicalOCRLine(text || "")
    .replace(/[0-9]/g, " ")
    .replace(/[<>{}\\/_|.,;:()[\]-]+/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function fuzzyLabelMatchScore(line, labels){
  const canon = normalizeAnchorToken(line);
  if (!canon) return 0;
  const compact = canon.replace(/\s+/g, "");
  let best = 0;
  for (const label of labels || []){
    const target = normalizeAnchorToken(label);
    const targetCompact = target.replace(/\s+/g, "");
    if (!targetCompact) continue;
    if (compact.includes(targetCompact)) return 1;
    const approx = findApproxTag(compact, targetCompact, Math.min(4, Math.max(1, Math.floor(targetCompact.length * 0.22))));
    if (approx !== -1) best = Math.max(best, 0.92);
    const d = damerauLevenshtein(compact.slice(0, targetCompact.length + 3), targetCompact, 6);
    const score = 1 - (d / Math.max(targetCompact.length, 1));
    if (score > best) best = score;
  }
  return best;
}

function findSchemaAnchorIndex(lineObjs, schema){
  let best = { index: -1, score: 0 };
  for (let i = 0; i < (lineObjs || []).length; i++){
    const score = fuzzyLabelMatchScore(lineObjs[i].raw, schema.labels);
    if (score > best.score){
      best = { index: i, score };
      if (score >= 0.99) break;
    }
  }
  return best.score >= 0.62 ? best.index : -1;
}

function looksLikeMRZ(line){
  const mrz = mrzify(line);
  return mrz.length >= 24 && /</.test(mrz) && /^[A-Z0-9<]+$/.test(mrz);
}

function findMRZBlocks(lineObjs){
  const mrzLines = lineObjs.filter(item => looksLikeMRZ(item.raw)).map(item => mrzify(item.raw));
  const td3 = [];
  for (let i = 0; i < mrzLines.length - 1; i++){
    if (mrzLines[i].length >= 40 && mrzLines[i+1].length >= 40) {
      td3.push([mrzLines[i], mrzLines[i+1]]);
    }
  }
  const td1 = [];
  for (let i = 0; i < mrzLines.length - 2; i++){
    if (mrzLines[i].length >= 24 && mrzLines[i+1].length >= 24 && mrzLines[i+2].length >= 24) {
      td1.push([mrzLines[i], mrzLines[i+1], mrzLines[i+2]]);
    }
  }
  return { td3, td1 };
}

function normalizeDocNumber(value){
  return (value || "")
    .toUpperCase()
    .replace(/[^A-Z0-9]/g, '');
}

function digitsFromOCR(value){
  return (value || "")
    .split('')
    .map(mapDigit)
    .join('');
}

function formatDateYYMMDD(raw6){
  const compact = digitsFromOCR(raw6).slice(0, 6);
  if (compact.length !== 6) return "";
  const yy = parseInt(compact.slice(0,2), 10);
  const mm = parseInt(compact.slice(2,4), 10);
  const dd = parseInt(compact.slice(4,6), 10);
  if (!(mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31)) return "";
  const year = yy >= 30 ? 1900 + yy : 2000 + yy;
  return `${String(dd).padStart(2,'0')}/${String(mm).padStart(2,'0')}/${year}`;
}

function countryCodeToLabel(code){
  const c = (code || "")
    .toUpperCase()
    .replace(/0/g, "O")
    .replace(/1/g, "I")
    .replace(/5/g, "S");
  const isoName = window.PAISES_ISO3?.countryNameFromIso3?.(c);
  if (isoName) return tcase(isoName);
  if (c === "ESP") return "EspaГұa";
  if (c === "GBR") return "Reino Unido";
  if (c === "DEU" || c === "D") return "Alemania";
  if (c === "FRA") return "Francia";
  if (c === "ITA") return "Italia";
  if (c === "PRT") return "Portugal";
  if (c === "NLD") return "PaГӯses Bajos";
  if (c === "USA") return "Estados Unidos";
  if (c === "VEN") return "Venezuela";
  if (c === "COL") return "Colombia";
  return c ? c : "";
}

function parseTD3Passport(lines){

  const [l1, l2] = lines.map(line => mrzify(line).padEnd(44, '<'));
  if (!/^P[A-Z<]/.test(l1)) return null;

  const docNum = normalizeDocNumber(l2.slice(0, 9).replace(/</g, ''));
  const nationality = countryCodeToLabel(l2.slice(10, 13));
  const birth = formatDateYYMMDD(l2.slice(13, 19));
  const sexChar = l2[20] || "";
  const surnameAndNames = l1.slice(5).split('<<');
  const surnames = (surnameAndNames[0] || "").replace(/</g, ' ').trim();

    "NВә Documento": docNum,

      "Fecha de nacimiento": birth ? 0.92 : 0,
      Sexo: sexChar ? 0.92 : 0,
      Apellidos: surnames ? 0.9 : 0,
      Nombre: names ? 0.9 : 0
    }
  };
}

function normalizeMrzOcrLine(line){
  let out = mrzify(line || "");
  out = out.replace(/K{2,}/g, (m) => "<".repeat(m.length));
  return out;
}

function cleanMRZNameChunk(chunk){
  return (chunk || "")
    .replace(/<+/g, " ")
    .replace(/[0-9]/g, " ")
    .replace(/\s{2,}/g, " ")
    .trim();
}

function normalizeMrzNameLine(line){
  let out = String(line || "");
  out = out.replace(/K{2,}/g, "<<");
  out = out.replace(/([A-Z]{3,})K<(?=[A-Z]{3,})/g, "$1<<");
  let prev = "";
  while (out !== prev){
    prev = out;
    out = out.replace(/([A-Z]{3,})K(?=[A-Z]{3,})/g, "$1<");
  }
  return out;
}

function expandCompactMrzNameChunk(chunk){
  const raw = chunk || "";
  if (/[<]/.test(raw)) return cleanMRZNameChunk(raw);
  const parts = raw.split(/K+/).filter(Boolean);
  if (parts.length >= 2 && parts.length <= 3 && parts.every(part => part.length >= 3)) {
    return cleanMRZNameChunk(parts.join(" "));
  }
  return cleanMRZNameChunk(raw);
}

function chooseLikelySpanishDocNumber(tail){
  const nie = String(tail || "").match(/([XYZ]\d{7}[A-Z])/);
  if (nie) return normalizeDocNumber(nie[1]);
  const matches = [...String(tail || "").matchAll(/(\d{7,8}[A-Z])/g)].map(m => normalizeDocNumber(m[1]));
  if (!matches.length) return "";
  const letters = "TRWAGMYFPDXBNJZSQVHLCKE";
  const valid = matches.filter(candidate => {
    const num = candidate.slice(0, -1);
    const letter = candidate.slice(-1);
    return /^\d{7,8}$/.test(num) && letters[Number(num) % 23] === letter;
  });
  if (valid.length) {
    valid.sort((a, b) => a.length - b.length);
    return valid[0];
  }
  return matches[matches.length - 1];
}

function parseSpanishIdespBlockFromOCR(ocrRaw){
  const rawLines = tokenizeOCRLines(ocrRaw).map(item => mrzify(item.raw));
  const lines = rawLines.map(line => normalizeMrzOcrLine(line));
  for (let i = 0; i < lines.length; i++){
    const line1 = lines[i];
    const isIdentityPrefix = /I[DR]ESP/.test(line1) || /IRESP/.test(line1);
    if (!isIdentityPrefix) continue;

    const rawLine1 = rawLines[i] || line1;
    const mPrefix = rawLine1.match(/I(?:D|R)ESP/);
    const prefixIndex = mPrefix ? mPrefix.index : rawLine1.indexOf("IRESP");
    const afterPrefix = rawLine1.slice((prefixIndex >= 0 ? prefixIndex : 0) + 5);
    const tail = afterPrefix.replace(/^[A-Z]+/, "");
    const isIresp = /IRESP/.test(line1);
    const foreignDocRaw = tail.match(/([A-Z]\d{9}[A-Z])/);
    const anchoredRaw = tail.match(/(\d{7,8}[A-Z])(?:[<K]+)?$/);
    const docNum = isIresp
      ? (foreignDocRaw ? normalizeDocNumber(foreignDocRaw[1]) : chooseLikelySpanishDocNumber(tail))
      : (anchoredRaw ? normalizeDocNumber(anchoredRaw[1]) : chooseLikelySpanishDocNumber(tail));

    let birth = "";
    let sexo = "";
    let nationality = "EspaГұa";
    const line2 = lines[i + 1] || "";
    const dateSex = line2.match(/^([0-9A-Z]{6})[0-9A-Z]?([MF])/);
    if (dateSex){
      birth = formatDateYYMMDD(dateSex[1]);
      sexo = dateSex[2] === "F" ? "FEMENINO" : "MASCULINO";
    }
    const nat = line2.match(/([A-Z0-9]{3})<{3,}/);
    if (nat) nationality = countryCodeToLabel(nat[1]) || nationality;

    let nombre = "";
    let apellidos = "";
    const rawNameLine = lines.slice(i + 1, i + 4).find(line => {
      if (/IDESP/.test(line)) return false;
      if (/^\d{6}[A-Z]/.test(line)) return false;
      return /<<|<[A-Z]+</.test(line) || ((line.match(/K/g) || []).length >= 3);
    });
    const nameLine = rawNameLine ? normalizeMrzNameLine(rawNameLine) : rawNameLine;
    if (nameLine){
      const parts = nameLine.split("<<");
      apellidos = expandCompactMrzNameChunk(parts[0]).toUpperCase();
      nombre = tcase(expandCompactMrzNameChunk(parts.slice(1).join(" ")));
    }

    const validCore = isLikelyValidDoc(docNum) && isLikelyValidDate(birth);
    if (!validCore) continue;

    return {
      Nombre: isLikelyValidName(nombre) ? nombre : "",
      Apellidos: isLikelyValidSurname(apellidos) ? apellidos : "",
      "Tipo de documento": /^[XYZ]/.test(docNum) || isIresp ? "NIE" : "DNI",
      "NВә Documento": docNum,
      Sexo: sexo,
      Nacionalidad: nationality,
      "Fecha de nacimiento": birth
    };
  }
  return null;
}

function extractMrzIdentityFromOCR(ocrRaw){
  const lines = tokenizeOCRLines(ocrRaw).map(item => mrzify(item.raw));
  const candidate = [...lines].reverse().find(line => {
    if (/^I[DR]ESP/.test(line) || /^IRESP/.test(line)) return false;
    if (/^\d{6}[A-Z]/.test(line)) return false;
    return (/[<K]/.test(line) && /[A-Z]{4,}/.test(line));
  });
  if (!candidate) return null;

  const normalized = normalizeMrzNameLine(candidate);
  if (!/<<|<[A-Z]{3,}</.test(normalized)) return null;

  const parts = normalized.split("<<");
  const apellidos = expandCompactMrzNameChunk(parts[0]).toUpperCase();
  const nombre = tcase(expandCompactMrzNameChunk(parts.slice(1).join(" ")));

  if (!isLikelyValidSurname(apellidos) || !isLikelyValidName(nombre)) return null;
  return { Nombre: nombre, Apellidos: apellidos };
}

function extractSectionLines(lineObjs, startRegex, endRegexes, maxLines = 4){
  if (!lineObjs || !lineObjs.length) return [];
  const endList = endRegexes || [];
  for (let i = 0; i < lineObjs.length; i++){
    const canon = canonicalOCRLine(lineObjs[i].raw);
    if (!startRegex.test(canon)) continue;
    const out = [];
    for (let j = i + 1; j < lineObjs.length && out.length < maxLines; j++){
      const nextCanon = canonicalOCRLine(lineObjs[j].raw);
      if (endList.some(rx => rx.test(nextCanon))) break;
      if (/^IDESP/.test(nextCanon) || looksLikeMRZ(lineObjs[j].raw)) break;
      const cleaned = cleanLineForField(lineObjs[j].raw);
      if (!cleaned) continue;
      out.push(cleaned);
    }
    if (out.length) return out;
  }
  return [];
}

function dedupeOrderedLines(lines){
  const out = [];
  const seen = new Set();
  for (const line of lines || []){
    const key = normalize(line || "").replace(/[^A-Z0-9]/g, "");
    if (!key || seen.has(key)) continue;
    seen.add(key);
    out.push(line);
  }
  return out;
}

function matchProvincia(raw){
  const cand = normAZ(raw);
  const can = normalize(cand);
  if (PROV_SET.has(can)) return { canon: cand, approx: false, found: true };
  const compact = can.replace(/\s+/g, '');
  const direct = PROV_NOSPACE.get(compact);
  if (direct) return { canon: direct, approx: false, found: true };
  return { canon: cand, approx: false, found: false };
}

function normalizeSpanishPlace(lines){
  const cleanedLines = dedupeOrderedLines((lines || []).map(line => cleanLineForField(line)).filter(Boolean));
  if (!cleanedLines.length) return "";

  const hasForeignCountry = cleanedLines.some(line => {
    const up = normalize(line);
    return /\b(RUSIA|VENEZUELA|FRANCIA|ALEMANIA|ITALIA|PORTUGAL|MARRUECOS|COLOMBIA|ARGENTINA|REINO UNIDO|UK|USA|ESTADOS UNIDOS)\b/.test(up);
  });

  if (hasForeignCountry){
    return tcase(cleanedLines.join(", "));
  }

  const municipality = cleanedLines.map(matchMunicipio).find(hit => hit?.found)?.canon || "";
  const province = cleanedLines.map(matchProvincia).find(hit => hit?.found)?.canon || "";

  const parts = [];
  if (municipality) parts.push(tcase(municipality));
  if (province){
    const provinceTitle = tcase(province);
    if (!parts.some(part => normalize(part) === normalize(provinceTitle))) parts.push(provinceTitle);
  }

  if (parts.length) return parts.join(", ");
  return tcase(cleanedLines.join(", "));
}

function normalizeSpanishAddress(lines){
  const cleanedLines = dedupeOrderedLines((lines || []).map(line => cleanLineForField(line)).filter(Boolean));
  if (!cleanedLines.length) return "";

  const street = cleanedLines[0] ? tcase(cleanedLines[0]) : "";
  const location = normalizeSpanishPlace(cleanedLines.slice(1));

  if (street && location) return `${street}, ${location}`;
  if (street) return street;
  return location;
}

function parseLabeledDocumentBlocks(ocrRaw){
  const lineObjs = tokenizeOCRLines(ocrRaw);
  const schemaLines = (schemaName, maxLines) => {
    const schema = FIELD_SCHEMAS[schemaName];
    const start = findSchemaAnchorIndex(lineObjs, schema);
    if (start === -1) return [];
    const out = [];
    for (let i = start + 1; i < lineObjs.length && out.length < maxLines; i++){
      const raw = lineObjs[i].raw;
      if (looksLikeMRZ(raw)) break;
      if (/^IDESP/i.test(canonicalOCRLine(raw))) break;
      const stopScore = fuzzyLabelMatchScore(raw, schema.stops);
      if (stopScore >= 0.7) break;
      const cleaned = cleanLineForField(raw);
      if (!cleaned) continue;
      out.push(cleaned);
    }
    return dedupeOrderedLines(out);
  };

  const domicilioLines = schemaLines("domicilio", 4);
  const lugarLines = schemaLines("lugar", 3);
  const padresLines = schemaLines("padres", 2);

  const domicilio = domicilioLines.length ? normalizeSpanishAddress(domicilioLines) : "";
  const lugar = lugarLines.length ? normalizeSpanishPlace(lugarLines) : "";
  let padres = "";
  if (padresLines.length){
    padres = extractParentNamesFromSegment(padresLines.join(" "));
    if (!padres){
      const rawParents = padresLines.join(" ")
        .replace(/\s*\/\s*/g, " y ")
        .replace(/\s{2,}/g, " ")
        .trim();
      padres = tcase(rawParents);
    }
  }

  return sanitizeParsedObjectFields({
    Domicilio: domicilio,
    "Lugar de nacimiento": lugar,
    "Nombre de los Padres": padres
  });
}

function extractLabeledValue(lineObjs, labelRegexes){
  for (let i = 0; i < lineObjs.length; i++){
    const raw = lineObjs[i].raw;
    const canon = canonicalOCRLine(raw);
    for (const rx of labelRegexes){
      if (!rx.test(canon)) continue;
      const inline = cleanLineForField(raw);
      if (inline && inline !== raw.trim()) return inline;
      const next = lineObjs[i + 1]?.raw || "";
      if (next && !looksLikeMRZ(next)) return cleanLineForField(next);
    }
  }
  return "";
}

function extractDateFromText(text){
  const source = text || "";
  const m1 = source.match(/\b(\d{2})[\/.-](\d{2})[\/.-](\d{2,4})\b/);
  if (m1){
    let year = m1[3];
    if (year.length === 2) year = (parseInt(year, 10) >= 30 ? "19" : "20") + year;
    return `${m1[1]}/${m1[2]}/${year}`;
  }
  const compact = normalize(source).replace(/\s+/g, "");
  const m2 = compact.match(/(\d{2})(\d{2})(\d{2,4})/);
  if (m2){
    let year = m2[3];
    if (year.length === 2) year = (parseInt(year, 10) >= 30 ? "19" : "20") + year;
    const mm = parseInt(m2[2], 10);
    const dd = parseInt(m2[1], 10);
    if (mm >= 1 && mm <= 12 && dd >= 1 && dd <= 31) return `${m2[1]}/${m2[2]}/${year}`;
  }
  return "";
}

function parseDatesFromLine(text){
  const source = text || "";
  const out = [];
  const rx = /\b(\d{2})[\/.-](\d{2})[\/.-](\d{2,4})\b/g;
  let m;
  while ((m = rx.exec(source))){
    let year = m[3];
    if (year.length === 2) year = (parseInt(year, 10) >= 30 ? "19" : "20") + year;
    out.push(`${m[1]}/${m[2]}/${year}`);
  }
  return out.filter(isLikelyValidDate);
}

function extractBirthDateFromDocument(lineObjs, preferredDate){
  if (isLikelyValidDate(preferredDate || "")) return preferredDate;

  let best = { value: "", score: -Infinity };
  for (let i = 0; i < lineObjs.length; i++){
    const line = lineObjs[i].raw;
    const canon = canonicalOCRLine(line);
    const prev = i > 0 ? canonicalOCRLine(lineObjs[i - 1].raw) : "";
    const dates = parseDatesFromLine(line);
    if (!dates.length) continue;

    let score = 0;
    if (/NACIMIENTO|DATE OF BIRTH|BIRTH/.test(canon) || /NACIMIENTO|DATE OF BIRTH|BIRTH/.test(prev)) score += 6;
    if (/VALIDEZ|CADUCIDAD|EXPIRY|EXPIRES/.test(canon) || /VALIDEZ|CADUCIDAD|EXPIRY|EXPIRES/.test(prev)) score -= 7;
    if (/EXPEDIC|EMISION|ISSUE/.test(canon) || /EXPEDIC|EMISION|ISSUE/.test(prev)) score -= 6;
    if (/NAC\b/.test(canon)) score += 2;

    const value = dates[0];
    if (score > best.score) best = { value, score };
  }

  if (best.value && best.score > 0) return best.value;
  return "";
}

function looksLikePersonNameLine(text){
  const v = cleanLineForField(text || "");
  if (!v || /\d/.test(v) || looksLikeMRZ(v)) return false;
  const words = v.split(/\s+/).filter(Boolean);
  if (!words.length || words.length > 5) return false;
  return words.every(word => /^[A-ZГҒГүГҚГ“ГҡГңГ‘][A-ZГҒГүГҚГ“ГҡГңГ‘a-zГЎГ©ГӯГіГәГјГұ'-]*$/.test(word));
}

function splitLikelyParentNames(text){
  const cleaned = cleanLineForField(text || "").replace(/\s{2,}/g, " ").trim();
  if (!cleaned || /\d/.test(cleaned)) return [];

  const direct = cleaned.split(/\s+(?:y|e)\s+/i).map(s => s.trim()).filter(Boolean);
  if (direct.length >= 2 && direct.every(isLikelyValidName)) return direct.slice(0, 2);

  const words = cleaned.split(/\s+/).filter(Boolean);
  const tokenScore = part => {
    const toks = part.split(/\s+/).filter(Boolean);
    if (!toks.length || !NOMBRES_SET || !NOMBRES_SET.size) return 0;
    let hits = 0;
    for (const tok of toks){
      if (NOMBRES_SET.has(normalize(tok))) hits++;
    }
    return hits;
  };

  if (words.length >= 2 && words.length <= 6 && NOMBRES_SET && NOMBRES_SET.size){
    let best = { score: -1, parts: [] };
    for (let cut = 1; cut < words.length; cut++){
      const left = words.slice(0, cut).join(" ");
      const right = words.slice(cut).join(" ");
      const scoreLeft = tokenScore(left);
      const scoreRight = tokenScore(right);
      if (!scoreLeft || !scoreRight) continue;
      const penalty = Math.abs(words.slice(0, cut).length - words.slice(cut).length) > 2 ? 1 : 0;
      const score = scoreLeft + scoreRight - penalty;
      if (score > best.score) best = { score, parts: [left, right] };
    }
    if (best.parts.length === 2 && best.parts.every(isLikelyValidName)) return best.parts;
  }

  if (words.length >= 2 && words.length <= 4 && words.every(w => /^[A-ZГҒГүГҚГ“ГҡГңГ‘][A-Za-zГҒГүГҚГ“ГҡГңГ‘ГЎГ©ГӯГіГәГјГұ'-]*$/.test(w))){
    if (words.length === 2) return [words[0], words[1]];
    if (words.length === 3) return [words[0], words.slice(1).join(" ")];
    if (words.length === 4) return [words.slice(0,2).join(" "), words.slice(2).join(" ")];
  }
  return [];
}

function knownNameTokenScore(text){
  const tokens = cleanLineForField(text || "")
    .split(/\s+/)
    .map(tok => normalize(tok))
    .filter(Boolean);
  if (!tokens.length || !NOMBRES_SET || !NOMBRES_SET.size) return 0;
  let hits = 0;
  for (const tok of tokens){
    if (NOMBRES_SET.has(tok)) hits++;
  }
  return hits;
}

function allTokensLookLikeKnownNames(text){
  const tokens = cleanLineForField(text || "")
    .split(/\s+/)
    .map(tok => normalize(tok))
    .filter(Boolean);
  if (!tokens.length) return false;
  if (!NOMBRES_SET || !NOMBRES_SET.size) return tokens.every(tok => tok.length >= 2 && tok.length <= 20);
  return tokens.every(tok => NOMBRES_SET.has(tok));
}

function splitCompactKnownNames(text, maxParts = 3){
  const compact = normalize(text || "").replace(/[^A-ZГ‘]/g, "");
  if (!compact || compact.length < 2) return [];
  if (!NOMBRES_SET || !NOMBRES_SET.size) return [];

  const memo = new Map();
  const solve = (pos, partsLeft) => {
    const key = `${pos}:${partsLeft}`;
    if (memo.has(key)) return memo.get(key);
    if (pos === compact.length) return [];
    if (partsLeft === 0) return null;

    let best = null;
    const maxLen = Math.min(compact.length, pos + 14);
    for (let end = pos + 2; end <= maxLen; end++){
      const tok = compact.slice(pos, end);
      if (!NOMBRES_SET.has(tok)) continue;
      const rest = solve(end, partsLeft - 1);
      if (rest === null) continue;
      const candidate = [tok, ...rest];
      if (!best || candidate.join("").length > best.join("").length) best = candidate;
      if (end === compact.length) break;
    }
    memo.set(key, best);
    return best;
  };

  for (let parts = 1; parts <= maxParts; parts++){
    const res = solve(0, parts);
    if (res && res.length) return res;
  }
  return [];
}

function splitCompactParentBlock(text){
  const tokens = splitCompactKnownNames(text, 4);
  if (!tokens.length) return [];
  if (tokens.length === 2) return [tokens[0], tokens[1]];
  if (tokens.length === 3) return [tokens[0], `${tokens[1]} ${tokens[2]}`];
  if (tokens.length === 4) return [`${tokens[0]} ${tokens[1]}`, `${tokens[2]} ${tokens[3]}`];
  return [];
}

function normalizeNameChunk(text, allowUnknown = false){
  const chunk = cleanLineForField(text || "").replace(/\s{2,}/g, " ").trim();
  if (!chunk || /\d/.test(chunk)) return "";

  const words = chunk.split(/\s+/).filter(Boolean);
  const built = [];

  for (const word of words){
    const simple = word.replace(/[^A-Za-zГҒГүГҚГ“ГҡГңГ‘ГЎГ©ГӯГіГәГјГұ'-]/g, "");
    if (!simple) continue;
    const segmented = splitCompactKnownNames(simple, 3);
    if (segmented.length){
      built.push(...segmented.map(tcase));
      continue;
    }
    if (allTokensLookLikeKnownNames(simple) || allowUnknown){
      built.push(tcase(simple));
      continue;
    }
    return "";
  }

  return built.join(" ").trim();
}

function extractParentNamesFromSegment(text){
  const cleaned = cleanLineForField(text || "")
    .replace(/[|]/g, " ")
    .replace(/\s{2,}/g, " ")
    .trim();
  if (!cleaned || /\d/.test(cleaned)) return "";

  const rawParts = cleaned
    .split(/\s*[\/]\s*|[0-9]+|\s+(?:y|e)\s+/i)
    .map(part => part.trim())
    .filter(Boolean);

  const normalizedParts = rawParts
    .map(part => normalizeNameChunk(part, true))
    .filter(Boolean);
  if (normalizedParts.length >= 2){
    const pair = normalizedParts.slice(-2);
    if (pair.every(isLikelyValidName)) return `${pair[0]} y ${pair[1]}`;
  }

  const guessed = splitLikelyParentNames(cleaned);
  if (guessed.length === 2){
    const left = normalizeNameChunk(guessed[0], false);
    const right = normalizeNameChunk(guessed[1], false);
    if (left && right) return `${left} y ${right}`;
  }

  const compact = normalize(cleaned).replace(/[^A-ZГ‘0-9]/g, "");
  const compactParts = compact.split(/[0-9]+/).filter(Boolean);
  if (compactParts.length >= 2){
    const left = normalizeNameChunk(compactParts[0], false);
    const right = normalizeNameChunk(compactParts[1], false);
    if (left && right) return `${left} y ${right}`;
  }

  if (compactParts.length === 1){
    const pair = splitCompactParentBlock(compactParts[0]);
    if (pair.length === 2) return `${tcase(pair[0])} y ${tcase(pair[1])}`;
  }

  return "";
}

function lineLooksLikeAddressOrPlace(text){
  const canon = canonicalOCRLine(text || "");
  return /DOMICILIO|ADDRESS|CALLE|C\.|AVDA|AVENIDA|PASEO|ARONA|ADEJE|MADRID|SANTA CRUZ|TENERIFE|LUGAR DE NACIMIENTO|PLACE OF BIRTH|NACIONALIDAD|NATIONALITY/.test(canon);
}

function extractParentsNearDocumentAnchor(lineObjs){
  if (!lineObjs || !lineObjs.length) return "";

  let anchor = -1;
  for (let i = 0; i < lineObjs.length; i++){
    const canon = canonicalOCRLine(lineObjs[i].raw);
    if (/IDESP|DESP/.test(canon) || looksLikeMRZ(lineObjs[i].raw)){
      anchor = i;
      break;
    }
  }
  if (anchor === -1) return "";

  for (let i = Math.max(0, anchor - 3); i < anchor; i++){
    const candidate = cleanLineForField(lineObjs[i].raw);
    if (!candidate || lineLooksLikeAddressOrPlace(candidate)) continue;
    const parsed = extractParentNamesFromSegment(candidate);
    if (parsed) return parsed;
  }
  return "";
}

function inferParentsByContext(lineObjs, subjectName="", subjectSurnames=""){
  if (!lineObjs || !lineObjs.length) return "";

  const subjectTokens = new Set(
    `${subjectName || ""} ${subjectSurnames || ""}`
      .split(/\s+/)
      .map(tok => normalize(tok))
      .filter(Boolean)
  );

  let best = { score: -Infinity, value: "" };
  const indexedLines = lineObjs.map((item, idx) => ({
    idx,
    raw: item.raw,
    clean: cleanLineForField(item.raw),
    canon: canonicalOCRLine(item.raw)
  }));

  let birthAnchor = -1;
  let placeAnchor = -1;
  let domicileAnchor = lineObjs.length;
  let mrzAnchor = lineObjs.length;
  let docAnchor = lineObjs.length;

  for (const item of indexedLines){
    if (birthAnchor === -1 && /NACIMIENTO|BIRTH|LUGAR DE NACIMIENTO|PLACE OF BIRTH/.test(item.canon)) birthAnchor = item.idx;
    if (placeAnchor === -1 && /LUGAR DE NACIMIENTO|PLACE OF BIRTH/.test(item.canon)) placeAnchor = item.idx;
    if (/DOMICILIO|ADDRESS/.test(item.canon) && domicileAnchor === lineObjs.length) domicileAnchor = item.idx;
    if (/DOCUMENTO|DOC|N[ВәO]|IDESP|IDENTIDAD/.test(item.canon) && docAnchor === lineObjs.length) docAnchor = item.idx;
    if (looksLikeMRZ(item.raw) && mrzAnchor === lineObjs.length) mrzAnchor = item.idx;
  }

  const anchor = placeAnchor !== -1 ? placeAnchor : birthAnchor;
  if (anchor === -1) return "";
  const zoneStart = Math.min(lineObjs.length - 1, anchor + 1);
  const zoneEnd = Math.min(domicileAnchor, docAnchor, mrzAnchor);
  if (zoneEnd <= zoneStart) return "";

  const windowLines = indexedLines
    .slice(zoneStart, Math.min(zoneEnd, zoneStart + 5))
    .filter(item => item.clean && !looksLikeMRZ(item.clean));

  for (let i = 0; i < windowLines.length; i++){
    const line = windowLines[i].clean;
    const sameLine = extractParentNamesFromSegment(line);
    if (sameLine){
      const overlap = sameLine
        .split(/\s+/)
        .map(tok => normalize(tok))
        .filter(tok => subjectTokens.has(tok)).length;
      const score = 10 + knownNameTokenScore(line) - (overlap * 4);
      if (overlap === 0 && score > best.score) best = { score, value: sameLine };
    }

    const next = windowLines[i + 1]?.clean || "";
    if (!line || !next) continue;
    if (!looksLikePersonNameLine(line) || !looksLikePersonNameLine(next)) continue;
    if (!allTokensLookLikeKnownNames(line) || !allTokensLookLikeKnownNames(next)) continue;

    const overlap = `${line} ${next}`
      .split(/\s+/)
      .map(tok => normalize(tok))
      .filter(tok => subjectTokens.has(tok)).length;
    if (overlap > 0) continue;

    const totalHits = knownNameTokenScore(line) + knownNameTokenScore(next);
    if (NOMBRES_SET && NOMBRES_SET.size && totalHits < 2) continue;

    const pair = `${tcase(line)} y ${tcase(next)}`;
    const score = 12 + totalHits - (overlap * 4);
    if (score > best.score) best = { score, value: pair };
  }

  return best.score >= 10 ? best.value : "";
}

function extractParentsFromDocument(lineObjs){
  for (let i = 0; i < lineObjs.length; i++){
    const raw = lineObjs[i].raw;
    const canon = canonicalOCRLine(raw);
    if (!/HIJO DE|HIJA DE|PADRES|PARENTS?/.test(canon)) continue;

    const inline = cleanLineForField(raw);
    if (inline && inline !== raw.trim() && isLikelyValidParents(inline)) return tcase(inline);

    const candidates = [];
    for (let j = i + 1; j <= Math.min(i + 2, lineObjs.length - 1); j++){
      const next = cleanLineForField(lineObjs[j].raw);
      if (!looksLikePersonNameLine(next)) break;
      candidates.push(tcase(next));
    }
    if (candidates.length === 1) return candidates[0];
    if (candidates.length >= 2) return `${candidates[0]} y ${candidates[1]}`;
  }

  const joined = lineObjs.map(item => item.raw).join(" ");
  const m = joined.match(/(?:HIJO DE|HIJA DE|PADRES?)\s*[:\-]?\s*([A-ZГҒГүГҚГ“ГҡГңГ‘][A-Za-zГҒГүГҚГ“ГҡГңГ‘ГЎГ©ГӯГіГәГјГұ'\- ]{2,60})/i);
  if (m && isLikelyValidParents(m[1])) return tcase(m[1]);
  return "";
}

function extractDocNumberFromText(text){
  const ns = normalize(text).replace(/\s+/g, "");
  const matches = ns.match(/[XYZ]?\d{7,8}[A-Z]|\b[A-Z]{3}\d{6}\b|\b[A-Z0-9]{8,9}\b/g);
  if (!matches || !matches.length) return "";
  return matches.sort((a,b) => b.length - a.length)[0];
}

function extractSexoFromText(text){
  const up = normalize(text);
  if (/\bFEMENINO\b|\bMUJER\b|\bF\b/.test(up)) return "FEMENINO";
  if (/\bMASCULINO\b|\bHOMBRE\b|\bM\b/.test(up)) return "MASCULINO";
  return "";
}

function extractNationalityFromText(text){
  const up = normalize(text);
  const code = up.match(/\b[A-Z]{3}\b/);
  if (code){
    const label = countryCodeToLabel(code[0]);
    if (label) return label;
  }
  if (/\bESPAN|ESPAГ‘A|ESP\b/.test(up)) return "EspaГұa";
  const m = text.match(/\b([A-ZГҒГүГҚГ“ГҡГңГ‘][A-ZГҒГүГҚГ“ГҡГңГ‘a-zГЎГ©ГӯГіГәГјГұ]+(?:\s+[A-ZГҒГүГҚГ“ГҡГңГ‘a-zГЎГ©ГӯГіГәГјГұ]+){0,2})\b/);
  return m ? tcase(m[1]) : "";
}

function scoreLine(line, test){
  if (!line) return 0;
  let score = 0;
  if (test.regex && test.regex.test(line)) score += test.points || 1;
  if (test.uppercase && line === line.toUpperCase()) score += test.uppercase;
  if (test.hasDigits && /\d/.test(line)) score += test.hasDigits;
  if (test.noDigits && !/\d/.test(line)) score += test.noDigits;
  if (test.hasComma && /,/.test(line)) score += test.hasComma;
  if (test.hasStreet && /\b(CALLE|CL\.|C\/|AVDA|AVENIDA|PASEO|PSO|PLAZA|CTRA|ROAD|STREET|AVE)\b/i.test(line)) score += test.hasStreet;
  if (test.notMRZ && !looksLikeMRZ(line)) score += test.notMRZ;
  return score;
}

function bestScoredLine(lines, tests){
  let best = null;
  lines.forEach(line => {
    let total = 0;
    tests.forEach(test => { total += scoreLine(line, test); });
    if (!best || total > best.score) best = { line, score: total };
  });
  return best && best.score > 0 ? best : null;
}

function inferNameParts(lineObjs){
  const lines = lineObjs
    .map(item => cleanLineForField(item.raw))
    .filter(line => line && !/\d/.test(line) && !looksLikeMRZ(line) && line.split(/\s+/).length <= 6);

  const surnameCandidate = bestScoredLine(lines, [
    { regex: /^[A-ZГҒГүГҚГ“ГҡГңГ‘\s'-]{4,}$/, points: 2, uppercase: 2, noDigits: 1, notMRZ: 1 }
  ]);
  const nameCandidate = bestScoredLine(lines, [
    { regex: /^[A-ZГҒГүГҚГ“ГҡГңГ‘][A-ZГҒГүГҚГ“ГҡГңГ‘\s'-]{1,}$/, points: 2, noDigits: 1, notMRZ: 1 }
  ]);

  return {
    Nombre: nameCandidate ? tcase(cleanLineForField(nameCandidate.line)) : "",
    Apellidos: surnameCandidate ? cleanLineForField(surnameCandidate.line).toUpperCase() : ""
  };
}

function detectDocumentType(text, mrzInfo){
  const up = normalize(text);
  if (mrzInfo?.td3?.length || /\bPASAPORTE\b|\bPASSPORT\b/.test(up)) return "Pasaporte";
  if (/\bNIE\b/.test(up)) return "NIE";
  if (/\bDNI\b|\bDOCUMENTO NACIONAL DE IDENTIDAD\b/.test(up)) return "DNI";
  if (mrzInfo?.td1?.length) return "DNI";
  return "DNI";
}

function miniAIInterpretFields(ocrRaw){
  const lineObjs = tokenizeOCRLines(ocrRaw);
  const plainLines = lineObjs.map(item => item.raw);
  const joined = plainLines.join("\n");
  const mrzInfo = findMRZBlocks(lineObjs);
  const mrzParsed = parseTD3Passport(mrzInfo.td3[0] || null) || parseTD1Spanish(mrzInfo.td1[0] || null) || null;
  const names = inferNameParts(lineObjs);

  const result = {
    Nombre: mrzParsed?.Nombre || "",
    Apellidos: mrzParsed?.Apellidos || "",
    "Tipo de documento": mrzParsed?.["Tipo de documento"] || detectDocumentType(joined, mrzInfo),
    "NВә Documento": mrzParsed?.["NВә Documento"] || "",
    Sexo: mrzParsed?.Sexo || "",
    Nacionalidad: mrzParsed?.Nacionalidad || "",
    "Nombre de los Padres": "",
    "Fecha de nacimiento": mrzParsed?.["Fecha de nacimiento"] || "",
    "Lugar de nacimiento": "",
    Domicilio: "",
    _confidence: { ...(mrzParsed?._confidence || {}) }
  };

  const valNombre = extractLabeledValue(lineObjs, [/^NOMBRE\b/, /^GIVEN NAMES?\b/]);
  const valApellidos = extractLabeledValue(lineObjs, [/^APELLIDOS?\b/, /^SURNAME\b/]);
  const valDoc = extractLabeledValue(lineObjs, [/DOCUMENTO/, /^DOC\b/, /NUMERO/, /N[ВәO]/]);
  const valSexo = extractLabeledValue(lineObjs, [/^SEXO\b/, /^SEX\b/]);
  const valNac = extractLabeledValue(lineObjs, [/^NACIONALIDAD\b/, /^NATIONALITY\b/]);
  const valFecha = extractLabeledValue(lineObjs, [/FECHA DE NACIMIENTO/, /DATE OF BIRTH/, /^NACIMIENTO\b/, /^BIRTH\b/]);
  const valLugar = extractLabeledValue(lineObjs, [/LUGAR DE NACIMIENTO/, /PLACE OF BIRTH/]);
  const valDom = extractLabeledValue(lineObjs, [/^DOMICILIO\b/, /^ADDRESS\b/]);
  const valPadres =
    extractParentsNearDocumentAnchor(lineObjs) ||
    inferParentsByContext(lineObjs, result.Nombre || names.Nombre, result.Apellidos || names.Apellidos) ||
    extractParentsFromDocument(lineObjs) ||
    extractLabeledValue(lineObjs, [/PADRES/, /HIJO DE/, /HIJA DE/, /PARENTS?/]);

  if (!result.Nombre) result.Nombre = valNombre ? tcase(valNombre) : names.Nombre;
  if (!result.Apellidos) result.Apellidos = (valApellidos || names.Apellidos).toUpperCase();
  if (!result["NВә Documento"]) result["NВә Documento"] = extractDocNumberFromText(valDoc || joined);
  if (!result.Sexo) result.Sexo = extractSexoFromText(valSexo || joined);
  if (!result.Nacionalidad) result.Nacionalidad = extractNationalityFromText(valNac || joined);
  result["Fecha de nacimiento"] = extractBirthDateFromDocument(lineObjs, result["Fecha de nacimiento"] || valFecha || "");
  if (!result["Lugar de nacimiento"]){
    const lugarHit = valLugar || bestScoredLine(plainLines.map(cleanLineForField), [
      { regex: /.{4,}/, points: 1, noDigits: 1, notMRZ: 1 },
      { regex: /\b(MADRID|BARCELONA|VALENCIA|SEVILLA|MALAGA|MURCIA|TENERIFE|PALMAS|LONDON|PARIS|ROME)\b/i, points: 3 }
    ])?.line || "";
    result["Lugar de nacimiento"] = lugarHit ? tcase(lugarHit) : "";
  }
  if (!result.Domicilio){
    const domHit = valDom || bestScoredLine(plainLines.map(cleanLineForField), [
      { regex: /.{8,}/, points: 1, notMRZ: 1 },
      { hasStreet: 4, hasDigits: 1, hasComma: 1 }
    ])?.line || "";
    result.Domicilio = domHit ? tcase(domHit) : "";
  }
  if (valPadres) result["Nombre de los Padres"] = tcase(valPadres);

  const ensureConfidence = (key, value, fallback) => {
    if (result._confidence[key] == null) result._confidence[key] = value ? fallback : 0;
  };

  ensureConfidence("Tipo de documento", result["Tipo de documento"], 0.7);
  ensureConfidence("NВә Documento", result["NВә Documento"], 0.8);
  ensureConfidence("Sexo", result.Sexo, 0.8);
  ensureConfidence("Nacionalidad", result.Nacionalidad, 0.75);
  ensureConfidence("Fecha de nacimiento", result["Fecha de nacimiento"], 0.8);
  ensureConfidence("Nombre", result.Nombre, 0.62);
  ensureConfidence("Apellidos", result.Apellidos, 0.65);
  ensureConfidence("Lugar de nacimiento", result["Lugar de nacimiento"], 0.55);
  ensureConfidence("Domicilio", result.Domicilio, 0.58);
  ensureConfidence("Nombre de los Padres", result["Nombre de los Padres"], 0.62);

  return result;
}

function sanitizeParsedFieldValue(key, value){
  const raw = (value || "").toString().trim();
  if (!raw) return "";

  let cleaned = raw
    .replace(/[|ВҰ]/g, " ")
    .replace(/[<>]{2,}/g, " ")
    .replace(/\s{2,}/g, " ")
    .trim();

  if (key === "Nombre" || key === "Apellidos" || key === "Nombre de los Padres" || key === "Lugar de nacimiento"){
    cleaned = cleaned
      .replace(/[0-9]/g, " ")
      .replace(/\b(?:ESP|IDESP|DNI|NIE|PASSPORT|P|CAN|CARD|DOCUMENTO|IDENTIDAD)\b/gi, " ")
      .replace(/[^A-Za-zГҒГүГҚГ“ГҡГңГ‘ГЎГ©ГӯГіГәГјГұ\s'\-]/g, " ")
      .replace(/\s{2,}/g, " ")
      .trim();
  }

  if (key === "Domicilio"){
    cleaned = cleaned
      .replace(/\b(?:IDESP|ESP|REPUBLICA|NATIONALITY|SEX|SEXO|DATE OF BIRTH|FECHA DE NACIMIENTO|APELLIDOS|NOMBRE)\b/gi, " ")
      .replace(/[<>]/g, " ")
      .replace(/\s{2,}/g, " ")
      .trim();
  }

  if (key === "NВә Documento"){
    cleaned = normalizeDocNumber(cleaned);
  }

  if (key === "Fecha de nacimiento"){
    cleaned = extractDateFromText(cleaned) || cleaned;
  }

  if (key === "Sexo"){
    const sx = extractSexoFromText(cleaned);
    cleaned = sx || "";
  }

  if (key === "Nacionalidad"){
    cleaned = extractNationalityFromText(cleaned) || cleaned;
  }

  return cleaned.replace(/\s{2,}/g, " ").trim();
}

function sanitizeParsedObjectFields(data){
  if (!data || typeof data !== "object") return data;
  const keys = [
    "Nombre",
    "Apellidos",
    "Tipo de documento",
    "NВә Documento",
    "Sexo",
    "Nacionalidad",
    "Nombre de los Padres",
    "Fecha de nacimiento",
    "Lugar de nacimiento",
    "Domicilio"
  ];
  const out = { ...data, _flags: { ...(data._flags || {}) } };
  keys.forEach(key => {
    if (out[key] == null) return;
    out[key] = sanitizeParsedFieldValue(key, out[key]);
  });
  return out;
}

function isLikelyValidName(value){
  const v = (value || "").trim();
  if (v.length < 2 || /\d/.test(v)) return false;
  const words = v.split(/\s+/).filter(Boolean);
  if (words.length < 1 || words.length > 4) return false;
  return words.every(word => /^[A-Za-zГҒГүГҚГ“ГҡГңГ‘ГЎГ©ГӯГіГәГјГұ'-]{2,20}$/.test(word));
}

function isLikelyValidPlace(value){
  const v = (value || "").trim();
  if (!v || /\d/.test(v)) return false;
  const words = v.replace(/,/g, " ").split(/\s+/).filter(Boolean);
  if (words.length < 1 || words.length > 10) return false;
  return words.every(word => /^[A-Za-zГҒГүГҚГ“ГҡГңГ‘ГЎГ©ГӯГіГәГјГұ'-]{2,24}$/.test(word));
}

function isLikelyValidSurname(value){
  const v = (value || "").trim();
  if (v.length < 2 || /\d/.test(v)) return false;
  const words = v.split(/\s+/).filter(Boolean);
  if (words.length < 1 || words.length > 3) return false;
  return words.every(word => /^[A-Za-zГҒГүГҚГ“ГҡГңГ‘ГЎГ©ГӯГіГәГјГұ'-]{2,20}$/.test(word));
}

function isLikelyValidParents(value){
  const v = (value || "").trim();
  if (!v || /\d/.test(v)) return false;
  const words = v.split(/\s+/).filter(Boolean);
  if (words.length < 1 || words.length > 8) return false;
  return words.every(word => /^(y|e|[A-Za-zГҒГүГҚГ“ГҡГңГ‘ГЎГ©ГӯГіГәГјГұ'-]{1,20})$/i.test(word));
}

function isLikelyValidDoc(value){
  const v = normalizeDocNumber(value);
  return /^[A-Z]?\d{5,8}[A-Z]$/.test(v);
}

function isLikelyValidDate(value){
  if (!/^\d{2}\/\d{2}\/\d{4}$/.test(value || "")) return false;
  const dd = parseInt(value.slice(0,2), 10);
  const mm = parseInt(value.slice(3,5), 10);
  return dd >= 1 && dd <= 31 && mm >= 1 && mm <= 12;
}

function isLikelyValidNationality(value){
  const v = tcase((value || "").trim());
  if (!v) return false;
  if (v === "EspaГұa") return true;
  if (v.length < 5 || v.length > 24) return false;
  return /^[A-Za-zГҒГүГҚГ“ГҡГңГ‘ГЎГ©ГӯГіГәГјГұ\s'-]+$/.test(v);
}

function isLikelyValidAddress(value){
  const v = (value || "").trim();
  if (v.length < 6 || v.length > 90 || looksLikeMRZ(v)) return false;
  if (/(<|IDESP|PASSPORT|NATIONALITY|DATE OF BIRTH)/i.test(v)) return false;
  return true;
}

function mergeParsedWithMiniAI(parsed, ai){
  const merged = sanitizeParsedObjectFields({
    ...parsed,
    _flags: { ...(parsed._flags || {}) }
  });

  const mergeField = (key, flagKey, threshold = 0.6, format, validator) => {
    const current = sanitizeParsedFieldValue(key, merged[key] || "");
    const candidate = sanitizeParsedFieldValue(key, ai[key] || "");
    const confidence = ai._confidence?.[key] || 0;
    const normalizedCandidate = format ? format(candidate) : candidate;
    const candidateLooksGood = validator ? validator(normalizedCandidate) : true;
    const currentLooksBad = validator ? !validator(current) : false;
    const shouldReplace = !current || (flagKey && merged._flags[flagKey]) || (currentLooksBad && confidence >= threshold);
    if (!candidate || !candidateLooksGood || !shouldReplace) return;
    merged[key] = normalizedCandidate;
    if (flagKey) merged._flags[flagKey] = confidence < threshold;
  };

  mergeField("Nombre", "Nombre", 0.7, value => tcase(value), isLikelyValidName);
  mergeField("Apellidos", "Apellidos", 0.7, value => value.toUpperCase(), isLikelyValidName);
  mergeField("NВә Documento", null, 0.75, value => value.toUpperCase(), isLikelyValidDoc);
  mergeField("Sexo", null, 0.8);
  mergeField("Nacionalidad", null, 0.7, value => tcase(value), isLikelyValidNationality);
  mergeField("Nombre de los Padres", "Padres", 0.55, value => tcase(value), isLikelyValidParents);
  mergeField("Fecha de nacimiento", null, 0.75, null, isLikelyValidDate);
  mergeField("Lugar de nacimiento", "Lugar", 0.6, value => tcase(value), isLikelyValidPlace);
  mergeField("Domicilio", "Domicilio", 0.6, value => tcase(value), isLikelyValidAddress);

  const aiBirth = sanitizeParsedFieldValue("Fecha de nacimiento", ai["Fecha de nacimiento"] || "");
  const aiBirthConf = ai._confidence?.["Fecha de nacimiento"] || 0;
  if (isLikelyValidDate(aiBirth) && aiBirthConf >= 0.88 && merged["Fecha de nacimiento"] !== aiBirth){
    merged["Fecha de nacimiento"] = aiBirth;
  }

  const aiDocType = sanitizeParsedFieldValue("Tipo de documento", ai["Tipo de documento"] || "");
  const aiDocConf = ai._confidence?.["Tipo de documento"] || 0;
  if (
    (!merged["Tipo de documento"] && aiDocType) ||
    (aiDocConf >= 0.7 && aiDocType && merged["Tipo de documento"] === "DNI" && aiDocType !== "DNI")
  ){
    merged["Tipo de documento"] = aiDocType;
  } else if (!merged["Tipo de documento"]) {
    merged["Tipo de documento"] = "DNI";
  }
  return merged;
}

function loadImage(url){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = () => reject(new Error("No se ha podido leer la imagen."));
    img.src = url;
  });
}

function isMobileOCRDevice(){
  return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || "");
}

function canUseNativeTextDetector(){
  return typeof window !== "undefined" && typeof window.TextDetector === "function";
}

function ensureNativeTextDetector(){
  if (!canUseNativeTextDetector()) return null;
  if (!nativeTextDetector) nativeTextDetector = new window.TextDetector();
  return nativeTextDetector;
}

async function optimizeImageForOCR(file){
  const url = URL.createObjectURL(file);
  try{
    const img = await loadImage(url);
    const isMobile = isMobileOCRDevice();
    const deviceMemory = Number(navigator.deviceMemory || 0);
    const maxSide = isMobile
      ? (deviceMemory && deviceMemory <= 4 ? 768 : 960)
      : 1600;
    const maxUpscale = isMobile ? 1.2 : 1.85;
    const longestSide = Math.max(img.naturalWidth || img.width || 0, img.naturalHeight || img.height || 0);
    const scale = longestSide > 0 ? Math.max(1, Math.min(maxUpscale, maxSide / longestSide)) : 1;
    const width = Math.max(1, Math.round((img.naturalWidth || img.width) * scale));
    const height = Math.max(1, Math.round((img.naturalHeight || img.height) * scale));

    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    if (!ctx) throw new Error("No se ha podido preparar la imagen.");

    ctx.filter = isMobile
      ? "grayscale(1) contrast(1.35) brightness(1.05)"
      : "grayscale(1) contrast(1.45) brightness(1.08)";
    ctx.drawImage(img, 0, 0, width, height);
    return canvas;
  } finally {
    URL.revokeObjectURL(url);
  }
}

function cropCanvasRegion(sourceCanvas, topRatio, heightRatio){
  const srcW = sourceCanvas.width;
  const srcH = sourceCanvas.height;
  const top = Math.max(0, Math.floor(srcH * topRatio));
  const height = Math.max(1, Math.min(srcH - top, Math.floor(srcH * heightRatio)));
  const canvas = document.createElement('canvas');
  canvas.width = srcW;
  canvas.height = height;
  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  if (!ctx) throw new Error("No se ha podido recortar la imagen.");
  ctx.drawImage(sourceCanvas, 0, top, srcW, height, 0, 0, srcW, height);
  return canvas;
}

async function ensureBetterOCR(){
  if (betterOCRPromise) return betterOCRPromise;
  betterOCRPromise = (async () => {
    const Ocr = await loadBetterOCRModule();
    const engine = await Ocr.create({
      models: OCR_MODELS,
      isDebug: false
    });
    return engine;
  })();
  try{
    return await betterOCRPromise;
  } catch (err){
    betterOCRPromise = null;
    throw err;
  }
}

function flattenBetterOCRResult(result){
  if (Array.isArray(result)){
    const text = result
      .map(line => typeof line?.text === "string" ? line.text : "")
      .filter(Boolean)
      .join("\n");
    return cleanupOCRText(text);
  }
  if (typeof result === "string") return cleanupOCRText(result);
  if (result?.text) return cleanupOCRText(result.text);
  if (Array.isArray(result?.texts)){
    const text = result.texts
      .map(line => typeof line?.text === "string" ? line.text : "")
      .filter(Boolean)
      .join("\n");
    if (text) return cleanupOCRText(text);
  }
  const blocks = Array.isArray(result?.blocks) ? result.blocks : [];
  const text = blocks.map(block => block?.text || "").filter(Boolean).join("\n");
  return cleanupOCRText(text);
}

function mergeOCRTexts(parts){
  const seen = new Set();
  const lines = [];
  for (const part of parts){
    for (const line of cleanupOCRText(part).split(/\n+/)){
      const clean = line.trim();
      if (!clean) continue;
      const key = clean.replace(/\s+/g, " ").toUpperCase();
      if (seen.has(key)) continue;
      seen.add(key);
      lines.push(clean);
    }
  }
  return cleanupOCRText(lines.join("\n"));
}

async function extractOCRWithNativeDetector(preparedCanvas){
  const detector = ensureNativeTextDetector();
  if (!detector) throw new Error("TextDetector no disponible.");
  const upper = cropCanvasRegion(preparedCanvas, 0, 0.72);
  const lower = cropCanvasRegion(preparedCanvas, 0.56, 0.44);
  const canvases = [upper, lower];
  const chunks = [];
  for (let i = 0; i < canvases.length; i++){
    const canvas = canvases[i];
    setOCRStatus(i === 0 ? "OCR: nativo 35%" : "OCR: nativo 75%", true);
    const blocks = await detector.detect(canvas);
    const text = (blocks || [])
      .map(block => block?.rawValue || block?.text || "")
      .filter(Boolean)
      .join("\n");
    chunks.push(text);
    canvas.width = 1;
    canvas.height = 1;
    await new Promise(resolve => setTimeout(resolve, 0));
  }
  setOCRStatus("OCR: nativo 90%", true);
  return mergeOCRTexts(chunks);
}

async function detectCanvasWithBetterEngine(engine, canvas, progressLabel){
  if (progressLabel) setOCRStatus(progressLabel, true);
  const blob = await new Promise((resolve, reject) => {
    canvas.toBlob(
      out => out ? resolve(out) : reject(new Error("No se ha podido preparar la imagen para OCR.")),
      "image/jpeg",
      0.8
    );
  });
  const imageUrl = URL.createObjectURL(blob);
  try{
    const result = await engine.detect(imageUrl);
    return flattenBetterOCRResult(result);
  } finally {
    canvas.width = 1;
    canvas.height = 1;
    URL.revokeObjectURL(imageUrl);
  }
}

async function extractOCRWithBetterEngine(preparedCanvas){
  if (isMobileOCRDevice() && canUseNativeTextDetector()){
    try{
      return await extractOCRWithNativeDetector(preparedCanvas);
    } finally {
      preparedCanvas.width = 1;
      preparedCanvas.height = 1;
    }
  }
  if (isMobileOCRDevice()){
    preparedCanvas.width = 1;
    preparedCanvas.height = 1;
    throw new Error("Este mГіvil no soporta OCR local seguro en navegador. Usa un navegador compatible con TextDetector o prueba en escritorio.");
  }
  setOCRStatus("OCR: PaddleOCR 10%", true);
  const engine = await ensureBetterOCR();
  const isMobile = isMobileOCRDevice();
  try{
    if (isMobile){
      const upper = cropCanvasRegion(preparedCanvas, 0, 0.72);
      const lower = cropCanvasRegion(preparedCanvas, 0.56, 0.44);
      const topText = await detectCanvasWithBetterEngine(engine, upper, "OCR: zona superior 35%");
      await new Promise(resolve => setTimeout(resolve, 0));
      const bottomText = await detectCanvasWithBetterEngine(engine, lower, "OCR: MRZ 70%");
      const result = mergeOCRTexts([topText, bottomText]);
      setOCRStatus("OCR: PaddleOCR 90%", true);
      return result;
    }
    const result = await detectCanvasWithBetterEngine(engine, preparedCanvas, "OCR: PaddleOCR 45%");
    setOCRStatus("OCR: PaddleOCR 90%", true);
    return result;
  } finally {
    preparedCanvas.width = 1;
    preparedCanvas.height = 1;
  }
}

function cleanupOCRText(text){
  return (text || "")
    .replace(/\r/g, "\n")
    .replace(/[^\S\n]+/g, " ")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}

async function extractOCRFromImageFile(file){
  if (!file) return;
  if (!file.type.startsWith('image/')){
    alert("Selecciona una imagen del DNI.");
    return "";
  }
  const source = await optimizeImageForOCR(file);
  return await extractOCRWithBetterEngine(source);
}

async function runOCRFromFile(file){
  if (ocrRunning) return;

  ocrRunning = true;
  setOCRStatus("Preparando imagen...", true);
  try{
    const text = await extractOCRFromImageFile(file);
    if (!text){
      alert("El OCR no ha devuelto texto legible.");
      return;
    }
    await processOCR(text);
    setOCRStatus("OCR completado", false);
  }catch(err){
    console.error("Error OCR:", err);
    alert("No se ha podido leer el DNI con OCR.");
    setOCRStatus("OCR no disponible", false);
  } finally {
    ocrRunning = false;
    ocrPhaseLabel = "";
    ocrPhaseBase = 0;
    ocrPhaseSpan = 1;
    setOCRStatus(document.getElementById('ocrStatus')?.textContent || "OCR listo para imagen", false);
  }
}

async function runOCRBatch(files){
  const allFiles = Array.from(files || []);
  if (!allFiles.length) return;
  if (ocrRunning) return;

  if (batchDocumentsProcessed >= 10){
    alert("Ya has aГұadido 10 documentos al lote. Limpia el ГЎrea de texto si quieres empezar otro lote.");
    return;
  }

  const remaining = 10 - batchDocumentsProcessed;
  if (allFiles.length > remaining){
    alert(`Solo se procesarГЎn ${remaining} documento(s) mГЎs para completar el lote de 10.`);
  }
  const list = allFiles.slice(0, remaining);
  if (!list.length) return;

  ocrRunning = true;

  try{
    for (let i = 0; i < list.length; i++){
      const file = list[i];
      const batchIndex = batchDocumentsProcessed + 1;
      setOCRStatus(`Lote ${batchIndex}/10: preparando`, true);
      const ocr = await extractOCRFromImageFile(file);
      const parsed = await parseOCRToFields(ocr || "");
      appendBatchResult(batchIndex, file.name, ocr || "", parsed);
      batchDocumentsProcessed += 1;
      setOCRStatus(`Lote ${batchDocumentsProcessed}/10: completado`, true);
    }
    setOCRStatus(`Lote acumulado: ${batchDocumentsProcessed}/10`, false);
  } catch (err){
    console.error("Error OCR lote:", err);
    alert("No se ha podido procesar el lote de documentos.");
    setOCRStatus("OCR lote no disponible", false);
  } finally {
    ocrRunning = false;
    ocrPhaseLabel = "";
    ocrPhaseBase = 0;
    ocrPhaseSpan = 1;
    setOCRStatus(document.getElementById('ocrStatus')?.textContent || "OCR listo para imagen", false);
  }
}

function validateField(el){
  if (!el) return;
  const value = (el.value || "").trim();
  let ok = false;

  if (el.tagName === "INPUT" || el.tagName === "TEXTAREA"){
    // mГӯnimo 2 caracteres para considerarlo "bien" (borde verde)
    ok = value.length >= 2;
  } else if (el.tagName === "SELECT"){
    // selects: basta con que tenga algo elegido
    ok = value !== "";
  }

  el.classList.toggle("valid", ok);
  el.classList.toggle("invalid", !ok);
}
