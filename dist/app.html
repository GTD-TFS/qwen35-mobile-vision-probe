<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>FILIATRON</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230b1220'/%3E%3Ctext x='32' y='41' text-anchor='middle' font-size='30' fill='%23e6eefc' font-family='Arial'%3EF%3C/text%3E%3C/svg%3E">
  <meta name="theme-color" content="#0b1220">

  <style>
      :root{
      --bg:#0b1220; --fg:#e6eefc; --accent:#0979f1;
      --card:rgba(255,255,255,.08); --border:rgba(255,255,255,.18);
      --green:#22c57b; --red:#ff5656;
      /* ↓↓↓ NUEVO: control del brillo del título ↓↓↓ */
      --title-glow: 0.35;        /* 0–1: intensidad del brillo */
      --title-glow-size: 18px;  /* tamaño del halo (px) */
    }
    
    *{box-sizing:border-box}
    body{
      margin:0;padding:20px;
      font-family:system-ui,"Segoe UI",Arial;
      color:var(--fg);
      /* Fondo con imagen (se gestiona con pseudo-elementos para asegurar visibilidad) */
      background:none;
      min-height:100dvh;
    }
    /* Capa de foto de fondo asegurada */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      background:url('./assets/verde-BixG2Qme.jpg') center / cover no-repeat;
      z-index:-2;
      transform:translateZ(0); /* fuerza pintar y evita glitches de backdrop-filter */
    }
    /* Velo oscuro encima de la foto (controla visibilidad del fondo) */
    body::after{
      content:"";
      position:fixed;
      inset:0;
      background:linear-gradient(180deg, rgba(11,18,32,.85), rgba(11,18,32,.010));
      z-index:-1;
      pointer-events:none;
    }
    h1{
  margin:0 0 14px;
  font-size:32px;
  line-height:1.1;
  letter-spacing:.6px;
  font-weight:800;
  background:linear-gradient(92deg, #e6eefc, #8fc8ff 45%, #197ce5 80%);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  text-shadow:
    0 1px 0 rgba(0,0,0,.25),
    0 0 8px rgba(255,255,255,var(--title-glow)),
    0 0 18px rgba(255,255,255, calc(var(--title-glow)*0.6));
  text-align:center;
  position: relative;
  isolation: isolate;                   /* aísla el blend del halo */
  -webkit-text-stroke: .6px rgba(255,255,255,.35);  /* bordes más nítidos */
  filter: saturate(1.15);               /* refuerza el degradado */
}

/* Halo que suma luz sin “lavar” el relleno */
h1::after{
  content: attr(data-title);
  position: absolute;
  inset: 0;
  z-index: -1;
  color: #ffffff;
  opacity: calc(var(--title-glow) * 0.85);
  filter: blur(var(--title-glow-size)) brightness(1.2) saturate(1.3);
  mix-blend-mode: screen;               /* suma luz respetando el color del texto */
  pointer-events: none;
}
    .grid{display:grid;gap:16px;max-width:1100px;margin:0 auto} /* centrado del layout */
    .two{grid-template-columns:1fr}
    @media(min-width:900px){.two{grid-template-columns:1fr 1fr}}
    .card{
      background:rgba(11,18,32,.08);
      border:1px solid rgba(255,255,255,.06);
      border-radius:14px;
      padding:16px;
      backdrop-filter:blur(10px);
      box-shadow:0 4px 14px rgba(0,0,0,.35);
    }
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;align-items:center}
    .row.center{justify-content:center}                   /* centrado de botones */
    .btn{
      border:none;
      color:var(--fg);
      background:transparent;              /* fondo totalmente transparente */
      padding:10px 14px;
      border-radius:12px;
      cursor:pointer;
      box-shadow:0 0 18px rgba(9,121,241,.85);  /* resplandor azul difuso (no aro) */
      transition:box-shadow .18s ease, transform .12s ease;
    }
    .btn.secondary{
      border:none;
      background:transparent;                        /* sin relleno */
      box-shadow:0 0 16px rgba(255,255,255,.55);    /* resplandor blanco/gris suave */
    }
    /* Comparecencia GPT en morado */
    #gptComparecencia{
      border:none !important;
      background:transparent;                           /* sin relleno morado */
      box-shadow:0 0 20px rgba(138,77,255,.95);        /* resplandor morado difuso */
    }
    #gptComparecencia:hover{ box-shadow:0 6px 18px rgba(138,77,255,.25) }
    #gptComparecencia:focus{ outline:2px solid rgba(138,77,255,.45); outline-offset:2px }
    /* Botón naranja: agregar filiación */
    #addFiliacion{
      border:none !important;
      background:transparent;                           /* sin relleno naranja */
      box-shadow:0 0 20px rgba(255,140,26,.95);        /* resplandor naranja difuso */
    }
    #addFiliacion:hover{
      box-shadow:0 0 26px rgba(255,140,26,1);
      transform:translateY(-1px);
    }
    #addFiliacion:focus{ outline:2px solid rgba(255,140,26,.5); outline-offset:2px; }

    /* Escoba en rojo */
    #clearForm{
      border:none !important;
      background:transparent;                           /* sin relleno rojo */
      box-shadow:0 0 20px rgba(255,86,86,.95);         /* resplandor rojo difuso */
    }
    #clearForm:hover{
      box-shadow:0 0 26px rgba(255,86,86,1);
      transform:translateY(-1px);
    }
    #clearForm:focus{ outline:2px solid rgba(255,86,86,.55); outline-offset:2px; }

    /* Botón cargar cifrado (verde) */
    #loadEncrypted{
      border:none !important;
      background:transparent;                           /* sin relleno verde */
      box-shadow:0 0 20px rgba(34,197,123,.95);        /* resplandor verde difuso */
    }
    #loadEncrypted:hover{ box-shadow:0 6px 18px rgba(34,197,123,.25); }
    #loadEncrypted:focus{ outline:2px solid rgba(34,197,123,.5); outline-offset:2px; }
    .fields{display:grid;gap:12px;grid-template-columns:1fr}
    @media(min-width:760px){.fields{grid-template-columns:1fr 1fr}}
    label{font-size:12px;margin-bottom:4px;color:#cfe0ff;display:block}
    input,select,textarea{
      width:100%;padding:10px;border-radius:12px;background:rgba(10,16,28,.28);
      color:var(--fg);border:0.5px solid var(--border);outline:none;transition:border-color .15s
    }
    textarea{min-height:120px;resize:vertical}
    input.valid,select.valid{border-color:var(--green)!important}
    input.invalid,select.invalid{border-color:var(--red)!important}
    .span2{grid-column:1/-1}
    .badge{padding:4px 8px;border-radius:9999px;background:rgba(255,255,255,.12);border:1px solid var(--border);font-size:12px}
    .badge{ box-shadow:0 2px 10px rgba(77,163,255,.12), inset 0 0 0 1px rgba(255,255,255,.05) }
    .btn:hover{
      box-shadow:0 0 24px rgba(77,163,255,1);
      transform:translateY(-1px);
    }
    .btn:focus{ outline:2px solid rgba(77,163,255,.45); outline-offset:2px }
    .grow{flex:1}
    ul.list{list-style:none;margin:0;padding:0;display:flex;flex-wrap:wrap;gap:8px}
    ul.list li{
      position:relative;
      border-radius:10px;
      padding:6px 10px;
      background:rgba(10,16,28,.75);
      font-size:12px;
      border:1px solid transparent; /* el borde visible lo hace el pseudo */
      overflow:hidden;
    }
    ul.list li::before{
      content:"";
      position:absolute;
      inset:0;
      padding:1px;
      border-radius:inherit;
      background:linear-gradient(135deg,#22c55e,#facc15); /* verde → amarillo */
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite:xor;
      mask-composite:exclude;
      pointer-events:none;
    }
    ul.list li button{margin-left:8px}

    /* Campo con duda (modo B, borde amarillo) */
    input.uncertain, select.uncertain, textarea.uncertain{
      border-color:#ffc107 !important;
      box-shadow:0 0 0 2px rgba(255,193,7,.18) inset;
    }

    .ia-badge{
      position:fixed;
      top:12px;
      left:12px;
      z-index:20;
      font-size:24px;
      line-height:1;
      filter:drop-shadow(0 2px 6px rgba(0,0,0,.45));
      user-select:none;
      pointer-events:none;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-4QNtr33_.js"></script>
</head>
<body>
<div class="ia-badge" title="Version IA">🧠</div>
<h1 data-title="FILIATRON">FILIATRON</h1>

<div class="grid two">
  <!-- ACCIONES -->
  <div class="card">
    <div class="row center">
      <button class="btn" id="gptComparecencia" title="Abrir Comparecencia GPT">Comparecencia GPT 🤖</button>
    </div>

    <div class="row center" style="margin-top:10px">
      <span class="badge">Filiaciones: <span id="countF">0</span></span>
      <ul class="list" id="listaF"></ul>
    </div>
  </div>

  <!-- COMPARECENCIA + CAMPOS -->
  <div class="card">
    <div class="fields">
      <div class="span2">
        <!-- Texto 'Comparecencia (DOC)' eliminado -->
        <div class="row center" style="margin:6px 0 8px 0">
          <button class="btn" id="integrarDoc">Pegar comparecencia 📋</button>
        </div>
        <textarea id="Doc"></textarea>
        <div class="row center" style="margin:8px 0 6px 0">
          <button class="btn" id="readAnalyze">Integrar DNI 🪪</button>
          <button class="btn secondary" id="readAnalyzeBatch">Lote DNI x10</button>
        </div>
        <div class="row center" style="margin:0 0 8px 0">
          <span class="badge" id="ocrStatus">OCR listo para imagen</span>
          <input type="file" id="dniImageInput" accept="image/*" capture="environment" style="display:none">
          <input type="file" id="dniBatchInput" accept="image/*" multiple style="display:none">
        </div>
      </div>

      <!-- Ficha de filiación actual -->
      <div><label>Nombre</label><input id="Nombre"></div>
      <div><label>Apellidos (MAYÚSCULAS)</label><input id="Apellidos"></div>
      <div><label>Tipo de documento</label><input id="Tipo"></div>
      <div><label>Nº documento</label><input id="Numero"></div>
      <div><label>Sexo</label>
        <select id="Sexo"><option></option><option>MASCULINO</option><option>FEMENINO</option></select>
      </div>
      <div><label>Nacionalidad</label><input id="Nacionalidad"></div>
      <div class="span2"><label>Nombre de los Padres</label><input id="Padres"></div>
      <div><label>Fecha de nacimiento</label><input id="Nacimiento"></div>
      <div><label>Lugar de nacimiento</label><input id="Lugar"></div>
      <div class="span2"><label>Domicilio</label><input id="Domicilio"></div>
      <div><label>Teléfono</label><input id="Telefono" inputmode="numeric" pattern="[0-9 ]*"></div>
      <div><label>Condición (oblig.)</label>
        <select id="Condicion">
          <option></option><option>Requirente</option><option>Perjudicado</option>
          <option>Testigo</option><option>Identificado</option>
        </select>
      </div>

      <div class="span2"></div>
      <div class="span2 row center" style="margin-top:6px">
        <button class="btn" id="addFiliacion">👤 Agregar filiación al expediente</button>
        <button class="btn secondary broom" id="clearForm" title="Limpiar formulario">🧹</button>
        <button class="btn" id="download">⬇️ Descargar cifrado 🔐 </button>
        <button class="btn secondary" id="loadEncrypted">⬆️ Cargar cifrado 🔐 </button>
        <input type="file" id="encryptedInput" accept=".enc,.txt,.json" style="display:none">
      </div>
    </div>
  </div>
</div>

<script src="./paises_iso3.js"></script>
<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', async () => {
    const isLocalDev = location.hostname === '127.0.0.1' || location.hostname === 'localhost';
    if (isLocalDev){
      try{
        const regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(reg => reg.unregister()));
      }catch(err){
        console.warn('SW cleanup error', err);
      }

      if (window.caches){
        try{
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }catch(err){
          console.warn('Cache cleanup error', err);
        }
      }
      return;
    }

    navigator.serviceWorker.register('./sw.js?v=dev2', { updateViaCache: 'none' })
      .catch(err => console.error('SW error', err));
  });
}
</script>
</body>
</html>
